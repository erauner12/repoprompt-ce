<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RepoPrompt CE Coordinator Mode Mock</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #17191b;
      --panel: #202326;
      --panel-2: #24282c;
      --panel-3: #171a1d;
      --line: rgba(255,255,255,.09);
      --line-strong: rgba(255,255,255,.16);
      --text: #e8eaed;
      --muted: #a6abb3;
      --faint: #707781;
      --blue: #3f86ff;
      --green: #64d66d;
      --amber: #c7924b;
      --red: #d95f5f;
      --purple: #b86be8;
      --cyan: #40c8e0;
      --shadow: 0 20px 60px rgba(0,0,0,.38);
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #0f1113;
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    button, input, textarea { font: inherit; }
    button { color: inherit; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 54px 1fr;
      background:
        radial-gradient(circle at 15% 0%, rgba(54,119,210,.10), transparent 28%),
        linear-gradient(180deg, #1e2225 0, #151719 58%, #111315 100%);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(31,35,38,.82);
      backdrop-filter: blur(18px);
      min-width: 0;
    }
    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .traffic { display: flex; gap: 8px; flex: none; }
    .traffic span { width: 12px; height: 12px; border-radius: 50%; display: block; }
    .traffic span:nth-child(1) { background: #ff6159; }
    .traffic span:nth-child(2) { background: #ffbd2e; }
    .traffic span:nth-child(3) { background: #28c840; }
    .workspace-title {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .surface-switch {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);
    }
    .surface-switch button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 14px;
      padding: 6px 22px;
      min-width: 100px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .surface-switch button.active {
      background: rgba(63,134,255,.25);
      color: #6fa4ff;
    }
    .toolbar-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill.blue { color: #75a8ff; background: rgba(63,134,255,.16); border-color: rgba(63,134,255,.25); }
    .pill.green { color: #8be68f; background: rgba(100,214,109,.12); border-color: rgba(100,214,109,.20); }
    .pill.amber { color: #d4a667; background: rgba(199,146,75,.13); border-color: rgba(199,146,75,.22); }
    .pill.red { color: #e07a7a; background: rgba(217,95,95,.13); border-color: rgba(217,95,95,.24); }
    .pill.purple { color: #cf92f1; background: rgba(184,107,232,.14); border-color: rgba(184,107,232,.24); }
    .pill.cyan { color: #66d6e8; background: rgba(64,200,224,.12); border-color: rgba(64,200,224,.22); }
    .pill.icon-pill {
      width: 34px;
      height: 28px;
      justify-content: center;
      padding: 0;
    }
    .pill.icon-pill svg {
      width: 16px;
      height: 16px;
      display: block;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block;
      flex: none;
    }

    .main { min-height: 0; overflow: hidden; }
    .surface { height: 100%; min-height: 0; }

    .coordinator-shell {
      display: grid;
      grid-template-columns: 260px minmax(540px, 1.05fr) minmax(500px, .95fr);
      gap: 10px;
      padding: 10px;
      min-height: 0;
      height: 100%;
    }
    .coordinator-shell.all-board {
      grid-template-columns: 280px 1fr;
    }
    .agent-shell {
      display: grid;
      grid-template-columns: 292px 1fr;
      gap: 10px;
      padding: 10px;
      min-height: 0;
      height: 100%;
    }
    .panel {
      background: rgba(32,35,38,.82);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      min-height: 0;
      overflow: hidden;
    }
    .sidebar {
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 14px;
    }
    .side-top {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .nav-button, .row-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      cursor: pointer;
      padding: 10px;
      min-width: 0;
    }
    .nav-button { font-weight: 700; }
    .nav-button.active, .row-button.active {
      border-color: rgba(63,134,255,.36);
      background: rgba(63,134,255,.18);
      color: var(--text);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: rgba(255,255,255,.06);
      display: grid;
      place-items: center;
      font-size: 12px;
      color: #82aefb;
      flex: none;
    }
    .nav-copy, .row-copy {
      min-width: 0;
      display: block;
      overflow: hidden;
    }
    .nav-title, .row-title {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      line-height: 1.2;
    }
    .nav-sub, .row-sub {
      display: block;
      margin-top: 3px;
      color: var(--faint);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .01em;
      padding: 0 2px;
    }
    .rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow: auto;
    }
    .row-button {
      padding: 9px 10px;
      background: rgba(255,255,255,.025);
      border-color: rgba(255,255,255,.05);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
    }
    .row-button.child-row {
      margin-left: 22px;
      width: calc(100% - 22px);
      grid-template-columns: auto minmax(0, 1fr) auto;
      background: rgba(255,255,255,.018);
      position: relative;
    }
    .row-button.child-row::before {
      content: "";
      position: absolute;
      left: -12px;
      top: -8px;
      bottom: 50%;
      width: 12px;
      border-left: 1px solid rgba(255,255,255,.16);
      border-bottom: 1px solid rgba(255,255,255,.16);
      border-bottom-left-radius: 7px;
    }
    .row-leading {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #8fb6ff;
      background: rgba(63,134,255,.16);
      flex: none;
      font-size: 11px;
      font-weight: 800;
    }
    .row-trailing {
      min-width: 0;
      max-width: 118px;
      overflow: hidden;
    }
    .new-mission {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255,255,255,.035);
      padding: 10px;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }
    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .footer-root {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .footer-actions { display: flex; gap: 8px; }
    .workspace-card {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .workspace-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .workspace-switch {
      margin-left: auto;
      max-width: 150px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.045);
      color: var(--text);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .repo-list {
      display: grid;
      gap: 6px;
    }
    .repo-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 6px 8px;
      background: rgba(255,255,255,.026);
    }
    .repo-name {
      display: block;
      color: var(--text);
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .repo-branch {
      display: block;
      color: var(--faint);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .repo-row.add-folder {
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .ghost-button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
    }

    .conversation {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      min-height: 0;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,.055);
      min-width: 0;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .panel-sub {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spacer { flex: 1; }
    .link-button {
      border: 0;
      background: transparent;
      color: #70a7ff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }
    .scroll {
      min-height: 0;
      overflow: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .mission-card, .message, .checkpoint, .delegated-card, .node-card, .inspector-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.035);
    }
    .mission-card {
      padding: 12px;
      background: rgba(63,134,255,.08);
      border-color: rgba(63,134,255,.22);
    }
    .mission-head, .node-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .mission-head strong, .node-head strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .mission-objective, .message-body, .node-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
    }
    .message {
      padding: 11px 12px;
      background: rgba(255,255,255,.026);
    }
    .message.user {
      align-self: flex-end;
      max-width: 72%;
      background: rgba(63,134,255,.18);
      border-color: rgba(63,134,255,.22);
    }
    .message-label {
      display: flex;
      gap: 8px;
      color: #6ea4ff;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 5px;
    }
    .message.user .message-label { color: var(--muted); }
    .message-body ul { margin: 8px 0 0 18px; padding: 0; }
    .message-body li { margin: 4px 0; }
    .delegated-card {
      padding: 10px 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      cursor: pointer;
      border-color: rgba(63,134,255,.18);
    }
    .delegated-card.active {
      background: rgba(63,134,255,.16);
      border-color: rgba(63,134,255,.55);
    }
    .small-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(63,134,255,.18);
      color: #70a7ff;
      font-size: 12px;
      font-weight: 900;
    }
    .card-title {
      font-size: 13px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .checkpoint {
      margin: 0 16px 12px;
      padding: 12px;
      background: rgba(63,134,255,.10);
      border-color: rgba(63,134,255,.28);
    }
    .checkpoint-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 900;
      color: #8fb6ff;
    }
    .checkpoint-question {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .option-grid {
      margin-top: 10px;
      display: grid;
      gap: 7px;
    }
    .option {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.035);
      border-radius: 8px;
      padding: 9px 10px;
      display: flex;
      gap: 10px;
      cursor: pointer;
      text-align: left;
      align-items: flex-start;
    }
    .radio {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      margin-top: 1px;
      flex: none;
    }
    .option strong {
      display: block;
      font-size: 12px;
      line-height: 1.2;
    }
    .option span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .checkpoint-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .primary-button, .secondary-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
    }
    .primary-button {
      background: rgba(63,134,255,.85);
      color: white;
      border-color: rgba(63,134,255,.9);
    }
    .secondary-button {
      background: rgba(255,255,255,.05);
      color: var(--muted);
    }
    .composer {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--line);
    }
    .composer-box {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: rgba(15,17,19,.7);
      overflow: hidden;
    }
    .composer textarea, .agent-composer textarea {
      width: 100%;
      min-height: 38px;
      max-height: 110px;
      resize: vertical;
      display: block;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
    }
    .composer-strip, .agent-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      border-top: 1px solid var(--line);
      padding: 7px 8px;
    }
    .seg {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px;
      background: rgba(255,255,255,.035);
    }
    .seg button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 4px 10px;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
    }
    .seg button.active {
      background: rgba(63,134,255,.28);
      color: #8fb6ff;
    }
    .send {
      margin-left: auto;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: rgba(63,134,255,.24);
      color: #86b4ff;
      cursor: pointer;
      font-weight: 900;
    }
    .checkpoint-trigger {
      border: 1px solid rgba(63,134,255,.26);
      background: rgba(63,134,255,.14);
      color: #8fb6ff;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .work-panel {
      display: grid;
      grid-template-rows: auto minmax(220px, 1fr) minmax(160px, auto);
      min-height: 0;
      overflow: hidden;
    }
    .work-panel.inspector-collapsed {
      grid-template-rows: auto minmax(0, 1fr) 38px;
    }
    .panel-tabs {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.025);
    }
    .tabseg {
      display: inline-flex;
      gap: 3px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
    }
    .tabseg button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: 6px 22px;
      font-weight: 800;
      cursor: pointer;
    }
    .tabseg button.active {
      background: rgba(63,134,255,.28);
      color: #8fb6ff;
    }
    .board {
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(0, 1fr);
      gap: 10px;
      padding: 14px;
    }
    .all-board .board {
      grid-auto-columns: minmax(220px, 1fr);
    }
    .lane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      background: rgba(255,255,255,.026);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .lane-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }
    .lane-count {
      margin-left: auto;
      color: var(--muted);
      background: rgba(255,255,255,.06);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
    }
    .lane-body {
      min-height: 180px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 10px 10px;
    }
    .work-card {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255,255,255,.04);
      padding: 10px;
      cursor: pointer;
    }
    .work-card.active {
      border-color: rgba(63,134,255,.65);
      background: rgba(63,134,255,.16);
    }
    .work-card .card-title {
      white-space: normal;
      line-height: 1.3;
      font-size: 12px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
      min-width: 0;
    }
    .chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      display: inline-block;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: top;
    }
    .chip.blue { color: #8fb6ff; background: rgba(63,134,255,.14); border-color: rgba(63,134,255,.22); }
    .chip.green { color: #8be68f; background: rgba(100,214,109,.11); border-color: rgba(100,214,109,.20); }
    .chip.purple { color: #cf92f1; background: rgba(184,107,232,.12); border-color: rgba(184,107,232,.20); }
    .chip.amber { color: #d4a667; background: rgba(199,146,75,.12); border-color: rgba(199,146,75,.22); }
    .chip.cyan { color: #66d6e8; background: rgba(64,200,224,.11); border-color: rgba(64,200,224,.20); }
    .chip.red { color: #e07a7a; background: rgba(217,95,95,.12); border-color: rgba(217,95,95,.20); }
    .work-card .chip { max-width: 126px; }
    .empty {
      color: var(--faint);
      font-size: 12px;
      display: grid;
      place-items: center;
      min-height: 80px;
    }

    .plan {
      min-height: 0;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .workstream {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.032);
      overflow: hidden;
    }
    .workstream-head {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .workstream-title {
      display: block;
      font-size: 13px;
      font-weight: 900;
      min-width: 0;
    }
    .workstream-name {
      display: -webkit-box;
      min-width: 0;
      overflow: hidden;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .workstream-chips {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 5px;
      min-width: 0;
      max-width: 100%;
      margin-top: 7px;
    }
    .workstream-purpose {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .nodes { padding: 8px; display: grid; gap: 7px; }
    .node-card {
      padding: 9px;
      cursor: pointer;
    }
    .node-card.active {
      border-color: rgba(63,134,255,.65);
      background: rgba(63,134,255,.14);
    }
    .node-card.continuation { margin-left: 18px; }
    .node-desc {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .inspector {
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.025);
      padding: 0 14px 14px;
      max-height: 230px;
      min-height: 160px;
      overflow: auto;
    }
    .inspector.collapsed {
      min-height: 38px;
      max-height: 38px;
      padding-bottom: 0;
      overflow: hidden;
    }
    .inspector-handle {
      width: 100%;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: ns-resize;
      font-size: 12px;
      font-weight: 800;
      touch-action: none;
    }
    .inspector-handle::before {
      content: "";
      width: 48px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      display: block;
    }
    .inspector.collapsed .inspector-handle::before {
      background: rgba(111,164,255,.46);
    }
    .inspector-body {
      min-height: 0;
    }
    .inspector.collapsed .inspector-body {
      display: none;
    }
    .inspector-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .inspector-title {
      font-size: 15px;
      font-weight: 900;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .kv {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 8px 14px;
      font-size: 12px;
      line-height: 1.45;
    }
    .kv span:nth-child(odd) { color: var(--muted); }
    .kv code { font-family: var(--mono); font-size: 11px; color: var(--text); }

    .agent-sidebar {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 14px;
    }
    .search {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.035);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--text);
      width: 100%;
      outline: 0;
    }
    .agent-chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
    }
    .agent-transcript {
      padding: 18px 24px;
      overflow: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tool-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.05);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subagent-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.028);
      padding: 12px;
      display: grid;
      gap: 9px;
    }
    .subagent-panel-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }
    .subagent-card {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 9px;
      background: rgba(255,255,255,.038);
      padding: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      cursor: pointer;
    }
    .subagent-card.active {
      border-color: rgba(63,134,255,.55);
      background: rgba(63,134,255,.14);
    }
    .agent-composer {
      padding: 12px 24px 18px;
      border-top: 1px solid var(--line);
    }
    .agent-composer-box {
      border: 1px solid var(--line-strong);
      border-radius: 11px;
      background: rgba(15,17,19,.72);
      overflow: hidden;
    }

    .hidden { display: none !important; }

    @media (max-width: 1180px) {
      .coordinator-shell {
        grid-template-columns: 246px 1fr;
        grid-template-rows: minmax(0, 1fr) minmax(360px, 48vh);
      }
      .work-panel { grid-column: 1 / -1; }
      .coordinator-shell.all-board { grid-template-columns: 246px 1fr; grid-template-rows: 1fr; }
      .coordinator-shell.all-board .work-panel { grid-column: auto; }
      .toolbar-right .pill.version { display: none; }
    }

    @media (max-width: 780px) {
      .coordinator-shell, .agent-shell, .coordinator-shell.all-board {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0,1fr) minmax(360px,45vh);
      }
      .sidebar { max-height: 230px; }
      .surface-switch button { min-width: 80px; padding-left: 12px; padding-right: 12px; }
      .workspace-title { max-width: 180px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="titlebar-left">
        <div class="traffic"><span></span><span></span><span></span></div>
        <div class="workspace-title">repoprompt-ce-coordinator-runtime-demo</div>
      </div>
      <div class="toolbar-right">
        <div class="surface-switch" aria-label="Main surface">
          <button id="surfaceCoordinator" type="button">Coordinator</button>
          <button id="surfaceAgent" type="button">Agent</button>
        </div>
        <span class="pill amber icon-pill" title="Lightbulb" aria-label="Lightbulb">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18h6"></path>
            <path d="M10 22h4"></path>
            <path d="M8.5 14.5c-1.5-1.1-2.5-2.9-2.5-5A6 6 0 0 1 18 9.5c0 2.1-1 3.9-2.5 5-.8.6-1.2 1.3-1.3 2.1H9.8c-.1-.8-.5-1.5-1.3-2.1Z"></path>
          </svg>
        </span>
        <span class="pill green">MCP Server</span>
        <span class="pill blue version">Update v1.0.21</span>
      </div>
    </header>

    <main id="appRoot" class="main"></main>
  </div>

  <script>
    const missions = [
      {
        id: "m298",
        title: "Issue #298 provider cleanup",
        subtitle: "Demo runtime",
        status: "Running",
        approval: "Approved",
        revision: "r4",
        objective: "Implement GitHub issue #298: provider-side cleanup for RepoPrompt Agent Mode and Oracle sessions.",
        template: "Scoped Change",
        pace: "Auto",
        checkpoint: "step",
        messages: [
          { role: "user", text: "Coordinator mission: implement GitHub issue #298, provider-side cleanup for RepoPrompt Agent Mode and Oracle sessions." },
          { role: "coordinator", text: "I created a visible Mission Plan before delegation, gathered read-only evidence, and approved the isolated implementation lane. Current mutable work is running in a fresh worktree." },
          { role: "coordinator", text: "The implementation child owns the active worktree. Review will run as a fresh sibling on the same worktree after the primary lane reaches a stable handoff." }
        ],
        workstreams: [
          {
            id: "ws-discovery",
            title: "Provider cleanup surface discovery",
            role: "explore",
            policy: "Read-only child",
            strategy: "Read-only",
            purpose: "Map Agent Mode cleanup, provider metadata, Codex app-server thread APIs, and Oracle finalization paths before editing.",
            nodes: ["n1", "n2"]
          },
          {
            id: "ws-impl",
            title: "Provider-side cleanup implementation",
            role: "engineer",
            policy: "Fresh worktree",
            strategy: "New isolated worktree",
            purpose: "Add provider cleanup contract, Agent Mode setting/defaults, cleanup call sites, Oracle deletion, and tests.",
            nodes: ["n3", "n4"]
          },
          {
            id: "ws-review",
            title: "Fresh review and validation",
            role: "pair",
            policy: "Sibling on same worktree",
            strategy: "Same workstream worktree",
            purpose: "Review the implementation diff from an independent session and run focused validation.",
            nodes: ["n5", "n6"]
          }
        ],
        nodes: {
          n1: { title: "Map Agent Mode cleanup and provider metadata paths", status: "Completed", workflow: "agent_explore", policy: "Read-only child", deps: 0, session: "s-explore", desc: "Lightweight disposable probe for cleanup entry points and provider session ownership." },
          n2: { title: "Map provider archive-delete capability seams", status: "Completed", workflow: "Investigate", policy: "Read-only child", deps: 0, session: "s-investigate", desc: "Formal investigation of provider protocols/adapters and unsupported-provider reporting." },
          n3: { title: "Implement provider cleanup contract, Agent setting, and Oracle deletion", status: "Running", workflow: "Orchestrate", policy: "Fresh worktree", deps: 2, session: "s-impl", desc: "Primary mutable lane. Base ref: main. Worktree: rp-agent-2c4a8595-agent." },
          n4: { title: "Add and run focused provider cleanup tests", status: "Pending", workflow: "Orchestrate", policy: "Steer primary", deps: 1, session: "s-impl", desc: "Continue the primary implementation session after core behavior lands." },
          n5: { title: "Review provider cleanup implementation from a fresh session", status: "Pending", workflow: "Review", policy: "Sibling on same worktree", deps: 1, session: "s-review", desc: "Fresh review on the implementation worktree after the primary child completes." },
          n6: { title: "Run coordinated validation and prepare handoff summary", status: "Pending", workflow: "Review", policy: "Steer primary", deps: 1, session: "s-review", desc: "Final status, changed files, tests, and residual risk." }
        }
      },
      {
        id: "m-readme",
        title: "README purpose evidence",
        subtitle: "No-edit smoke",
        status: "Awaiting approval",
        approval: "Awaiting approval",
        revision: "r1",
        objective: "No-edit smoke mission: inspect README.md and report the repository purpose.",
        template: "None",
        pace: "Step",
        checkpoint: "approval",
        messages: [
          { role: "user", text: "Create a visible Mission Plan with approval_state awaiting_approval and one read-only evidence node. Do not start a child yet." },
          { role: "coordinator", text: "Mission Plan created and visible. Child sessions started: none. Held for approval before inspecting README.md." }
        ],
        workstreams: [
          {
            id: "ws-readme",
            title: "README purpose evidence",
            role: "explore",
            policy: "Read-only child",
            strategy: "Read-only",
            purpose: "Read README.md and summarize repository purpose without editing files.",
            nodes: ["n-readme"]
          }
        ],
        nodes: {
          "n-readme": { title: "Inspect README.md and report repository purpose", status: "Pending", workflow: "agent_explore", policy: "Read-only child", deps: 0, session: "s-readme", desc: "Narrow workflow-less read-only probe, not a formal Investigate workflow." }
        }
      },
      {
        id: "m-dag",
        title: "DAG-lite status smoke",
        subtitle: "MCP lineage root",
        status: "Completed",
        approval: "Approved",
        revision: "r8",
        objective: "Validate Mission Plan status, node counts, dependency satisfaction, and stopped/completed rendering.",
        template: "State-only",
        pace: "Auto",
        checkpoint: null,
        messages: [
          { role: "coordinator", text: "The state-only mission completed. Plan, Orchestrate, and Review nodes reached terminal state without launching child agents." }
        ],
        workstreams: [
          {
            id: "ws-status",
            title: "Status surface",
            role: "coordinator",
            policy: "Coordinator only",
            strategy: "No worktree",
            purpose: "Validate app-side plan status projection.",
            nodes: ["n-plan", "n-orch", "n-review"]
          }
        ],
        nodes: {
          "n-plan": { title: "Plan", status: "Completed", workflow: null, policy: "Coordinator only", deps: 0, session: null, desc: "Record initial Mission Plan state." },
          "n-orch": { title: "Orchestrate", status: "Completed", workflow: null, policy: "Coordinator only", deps: 1, session: null, desc: "State-only Orchestrate node completed." },
          "n-review": { title: "Review", status: "Completed", workflow: null, policy: "Coordinator only", deps: 1, session: null, desc: "Review completed after dependency satisfaction." }
        }
      }
    ];

    const sessions = [
      {
        id: "s-explore",
        title: "Explore issue #298 cleanup paths",
        mission: "m298",
        coordinatorChild: true,
        owner: "Issue #298 provider cleanup",
        status: "Done",
        workflow: "agent_explore",
        policy: "Read-only child",
        worktree: "parent checkout",
        branch: "coordinator/runtime-demo",
        model: "explore",
        transcript: [
          "Read-only probe: found cleanup entry points in Agent Mode session cleanup and provider metadata.",
          "Reported file references and stopped without edits."
        ],
        tools: ["Read File", "Search", "Explored codebase x14"]
      },
      {
        id: "s-investigate",
        title: "Investigate Agent cleanup #298",
        mission: "m298",
        coordinatorChild: true,
        owner: "Issue #298 provider cleanup",
        status: "Done",
        workflow: "Investigate",
        policy: "Read-only child",
        worktree: "rp-agent-01-investigate",
        branch: "rp/agent/investigate-cleanup",
        model: "gpt-5.5",
        transcript: [
          "Formal Investigate workflow: mapped provider archive/delete seams and unsupported-provider behavior.",
          "Returned evidence and recommended implementation boundaries."
        ],
        tools: ["Workflow: Investigate", "Read File", "Search", "Report"]
      },
      {
        id: "s-impl",
        title: "Issue 298 Provider Cleanup",
        mission: "m298",
        coordinatorChild: true,
        owner: "Issue #298 provider cleanup",
        status: "Working",
        workflow: "Orchestrate",
        policy: "Fresh worktree",
        worktree: "rp-agent-2c4a8595-agent",
        branch: "rp/agent/issue-298-provider-cleanup",
        model: "gpt-5.5",
        transcript: [
          "I will inspect existing cleanup, provider, and settings/test patterns first.",
          "Edited AIQueriesService.swift and AgentRuntimeProviderService.swift.",
          "Next: add focused tests and report behavior."
        ],
        tools: ["Explored & edited 41", "Edit x5", "Search", "Build pending"]
      },
      {
        id: "s-review",
        title: "Review Worktree rp-agent-2c4a8595-agent",
        mission: "m298",
        coordinatorChild: true,
        owner: "Issue #298 provider cleanup",
        status: "Working",
        workflow: "Review",
        policy: "Sibling on same worktree",
        worktree: "rp-agent-2c4a8595-agent",
        branch: "rp/agent/issue-298-provider-cleanup",
        model: "design",
        transcript: [
          "Fresh review will inspect the uncommitted diff from the implementation worktree.",
          "Waiting for primary implementation lane to reach handoff."
        ],
        tools: ["Workflow: Review", "Same worktree", "Pending"]
      },
      {
        id: "s-readme",
        title: "README purpose probe",
        mission: "m-readme",
        coordinatorChild: true,
        owner: "README purpose evidence",
        status: "Needs you",
        workflow: "agent_explore",
        policy: "Read-only child",
        worktree: "parent checkout",
        branch: "coordinator/runtime-demo",
        model: "explore",
        transcript: [
          "Queued read-only README probe. Waiting for approval before launch."
        ],
        tools: ["Planned only"]
      },
      {
        id: "s-impl-tests",
        title: "Focused cleanup test scout",
        parentSession: "s-impl",
        owner: "Issue 298 Provider Cleanup",
        status: "Working",
        workflow: "agent_explore",
        policy: "Agent-owned sub-agent",
        worktree: "rp-agent-2c4a8595-agent",
        branch: "rp/agent/issue-298-provider-cleanup",
        model: "explore",
        transcript: [
          "Sub-agent launched by the implementation session to map existing cleanup tests.",
          "Looking for narrow regression coverage without touching files."
        ],
        tools: ["Search", "Read File", "Test map"]
      },
      {
        id: "s-impl-review",
        title: "Provider API safety review",
        parentSession: "s-impl",
        owner: "Issue 298 Provider Cleanup",
        status: "Done",
        workflow: "Review",
        policy: "Agent-owned sub-agent",
        worktree: "rp-agent-2c4a8595-agent",
        branch: "rp/agent/issue-298-provider-cleanup",
        model: "design",
        transcript: [
          "Sub-agent reviewed the proposed provider cleanup contract.",
          "Recommended best-effort cleanup with local fallback preserved."
        ],
        tools: ["Review", "Diff read", "Safety notes"]
      },
      {
        id: "s-docs",
        title: "Docs polish",
        mission: null,
        owner: null,
        status: "Working",
        workflow: null,
        policy: "Normal Agent session",
        worktree: "current checkout",
        branch: "docs/polish",
        model: "gpt-5.5",
        transcript: [
          "Normal Agent Mode session unrelated to Coordinator Missions.",
          "This appears in Agent Mode but not in the Coordinator selected-Mission board."
        ],
        tools: ["Read File", "Edit", "Preview"]
      }
    ];

    const state = {
      surface: "coordinator",
      coordDestination: "chat",
      selectedMission: "m298",
      rightTab: "plan",
      selectedSession: "s-impl",
      selectedNode: "n3",
      pace: "Auto",
      agentSession: "s-impl",
      checkpointOpen: false,
      inspectorCollapsed: false,
      inspectorDragY: null,
      inspectorSuppressClick: false
    };

    const lanes = ["Needs you", "Working", "Done"];
    const statusClass = {
      "Needs you": "amber",
      "Working": "blue",
      "Review": "purple",
      "Done": "green",
      "Pending": "amber",
      "Running": "blue",
      "Completed": "green",
      "Awaiting approval": "amber",
      "Approved": "green",
      "Stopped": "red"
    };

    function mission(id) { return missions.find(m => m.id === id) || missions[0]; }
    function session(id) { return sessions.find(s => s.id === id) || sessions[0]; }
    function coordinatorSessions(missionID) {
      return sessions.filter(s => s.coordinatorChild && (!missionID || s.mission === missionID));
    }
    function subagentsFor(sessionID) {
      return sessions.filter(s => s.parentSession === sessionID);
    }
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
    function chip(text, cls = "") {
      if (!text) return "";
      return `<span class="chip ${cls}">${escapeHtml(text)}</span>`;
    }
    function pill(text, cls = "") {
      return `<span class="pill ${cls}">${escapeHtml(text)}</span>`;
    }
    function workflowClass(workflow) {
      if (workflow === "Review") return "purple";
      if (workflow === "Investigate") return "cyan";
      if (workflow === "Deep Plan") return "amber";
      if (workflow === "Orchestrate") return "green";
      if (workflow === "agent_explore") return "blue";
      return "";
    }

    function render() {
      document.getElementById("surfaceCoordinator").classList.toggle("active", state.surface === "coordinator");
      document.getElementById("surfaceAgent").classList.toggle("active", state.surface === "agent");
      document.getElementById("appRoot").innerHTML = state.surface === "coordinator" ? renderCoordinator() : renderAgent();
      bindEvents();
    }

    function renderCoordinator() {
      const all = state.coordDestination === "all";
      return `
        <section class="surface coordinator-shell ${all ? "all-board" : ""}">
          ${renderCoordinatorSidebar()}
          ${all ? "" : renderConversation()}
          ${renderWorkPanel(all)}
        </section>
      `;
    }

    function renderCoordinatorSidebar() {
      const m = mission(state.selectedMission);
      return `
        <aside class="panel sidebar">
          <div class="side-top">
            <button class="nav-button ${state.coordDestination === "chat" ? "active" : ""}" data-action="coord-dest" data-dest="chat">
              <span class="nav-icon">CC</span>
              <span class="nav-copy"><span class="nav-title">Coordinator Chat</span><span class="nav-sub">Selected parent and linked work</span></span>
            </button>
            <button class="nav-button ${state.coordDestination === "all" ? "active" : ""}" data-action="coord-dest" data-dest="all">
              <span class="nav-icon">AB</span>
              <span class="nav-copy"><span class="nav-title">All Agents Board</span><span class="nav-sub">Active work across Missions</span></span>
            </button>
          </div>

          <div class="section-title"><span>Missions</span><span>${missions.length}</span></div>
          <button class="new-mission" data-action="select-mission" data-id="m-readme">
            <span class="row-leading">+</span>
            <span class="row-copy"><span class="row-title">New Mission</span><span class="row-sub">Start a blank Coordinator...</span></span>
            <span class="row-trailing">${pill("Ready")}</span>
          </button>

          <div class="rows">
            ${missions.map(item => `
              <button class="row-button ${item.id === m.id ? "active" : ""}" data-action="select-mission" data-id="${item.id}">
                <span class="row-leading">${item.id === m.id ? "v" : "C"}</span>
                <span class="row-copy"><span class="row-title">${escapeHtml(item.title)}</span><span class="row-sub">${escapeHtml(item.subtitle)}</span></span>
                <span class="row-trailing">${pill(item.status, statusClass[item.status] || "")}</span>
              </button>
            `).join("")}
          </div>

          <div class="sidebar-footer">
            <button class="row-button">
              <span class="row-leading">A</span>
              <span class="row-copy"><span class="row-title">Archived Missions</span><span class="row-sub">53 archived parent threads</span></span>
            </button>
          </div>
        </aside>
      `;
    }

    function renderConversation() {
      const m = mission(state.selectedMission);
      const linked = coordinatorSessions(m.id);
      return `
        <section class="panel conversation">
          <div class="panel-header">
            <div>
              <div class="panel-title">Conversation</div>
              <div class="panel-sub">${escapeHtml(m.title)}</div>
            </div>
            <span class="spacer"></span>
            <button class="link-button">Stop</button>
            <button class="link-button">Clear</button>
          </div>

          <div class="scroll">
            ${renderMissionSummary(m)}
            ${m.messages.map(renderMessage).join("")}
            ${linked.map(renderDelegatedCard).join("")}
          </div>

          ${m.checkpoint === "step" && state.checkpointOpen ? renderCheckpoint(m) : m.checkpoint === "approval" ? renderCheckpoint(m) : ""}
          ${renderCoordinatorComposer(m)}
        </section>
      `;
    }

    function renderMissionSummary(m) {
      return `
        <div class="mission-card">
          <div class="mission-head">
            <strong>Mission Plan</strong>
            <span class="spacer"></span>
            ${pill(m.revision, "blue")}
            ${pill(m.status, statusClass[m.status] || "")}
            ${pill(m.approval, statusClass[m.approval] || "")}
          </div>
          <div class="mission-objective"><strong>${escapeHtml(m.objective)}</strong></div>
          <div class="chips">
            ${chip(`Template: ${m.template}`)}
            ${chip(`Pace: ${m.pace}`, m.pace === "Auto" ? "blue" : "amber")}
          </div>
        </div>
      `;
    }

    function renderMessage(msg) {
      return `
        <div class="message ${msg.role === "user" ? "user" : ""}">
          <div class="message-label">${msg.role === "user" ? "You" : "Coordinator"}</div>
          <div class="message-body">${escapeHtml(msg.text)}</div>
        </div>
      `;
    }

    function renderDelegatedCard(s) {
      return `
        <div class="delegated-card ${state.selectedSession === s.id ? "active" : ""}" data-action="select-session" data-id="${s.id}">
          <span class="small-icon">D</span>
          <span>
            <span class="card-title">${escapeHtml(s.title)}</span>
            <span class="card-sub">${escapeHtml(s.owner || "Normal Agent session")}</span>
          </span>
          ${pill(s.status, statusClass[s.status] || "")}
        </div>
      `;
    }

    function renderCheckpoint(m) {
      if (m.checkpoint === "approval") {
        return `
          <div class="checkpoint">
            <div class="checkpoint-title">Coordinator checkpoint <span class="spacer"></span>Question 1 of 1</div>
            <div class="checkpoint-question"><strong>Approval required</strong><br>Choose how the Coordinator should continue from this checkpoint.</div>
            <div class="option-grid">
              ${["Proceed|Run the next safe step the Coordinator proposed.","Revise|Edit the plan or instruction before continuing.","Gather evidence|Run narrow read-only probes before approval.","Deepen plan|Run a visible planning pass for broad uncertainty.","Get independent critique|Ask a separate design session to review the plan.","Start smaller|Revise to a smaller first phase.","Stop|End this Mission here."].map(renderOption).join("")}
            </div>
            <div class="checkpoint-actions"><button class="secondary-button">Back</button><button class="primary-button" data-action="approve-readme">Continue</button></div>
          </div>
        `;
      }
      if (m.checkpoint === "step") {
        return `
          <div class="checkpoint">
            <div class="checkpoint-title">Step checkpoint <span class="spacer"></span>${escapeHtml(m.pace)} pace</div>
            <div class="checkpoint-question"><strong>Implementation boundary reached</strong><br>Review the current DAG step before moving to the next safe step.</div>
            <div class="option-grid">
              ${["Continue|Resume the Coordinator with this observed boundary.","Revise|Edit the plan or instruction before continuing.","Stop|End this Mission here."].map(renderOption).join("")}
            </div>
            <div class="checkpoint-actions"><button class="secondary-button">Back</button><button class="primary-button">Continue</button></div>
          </div>
        `;
      }
      return "";
    }

    function renderOption(raw) {
      const [title, desc] = raw.split("|");
      return `<button class="option"><span class="radio"></span><span><strong>${escapeHtml(title)}</strong><span>${escapeHtml(desc)}</span></span></button>`;
    }

    function renderCoordinatorComposer(m) {
      return `
        <div class="composer">
          <div class="composer-box">
            <textarea placeholder="Message Coordinator..."></textarea>
            <div class="composer-strip">
              ${pill("Coordinator", "blue")}
              ${pill(m.status === "Running" ? "Live" : m.status, statusClass[m.status] || "")}
              <span class="seg">
                <button class="${m.pace === "Step" ? "active" : ""}" data-action="set-pace" data-pace="Step">Step</button>
                <button class="${m.pace === "Auto" ? "active" : ""}" data-action="set-pace" data-pace="Auto">Auto</button>
              </span>
              ${m.checkpoint === "step" ? `<button class="checkpoint-trigger" data-action="toggle-checkpoint">${state.checkpointOpen ? "Hide checkpoint" : "Step checkpoint"}</button>` : ""}
              ${pill("MCP / Tools")}
              ${m.id === "m-readme" ? pill("Mission Template") : ""}
              <button class="send">></button>
            </div>
          </div>
        </div>
      `;
    }

    function renderWorkPanel(all) {
      return `
        <section class="panel work-panel ${all ? "all-board" : ""} ${state.inspectorCollapsed ? "inspector-collapsed" : ""}">
          <div class="panel-tabs">
            <span class="tabseg">
              <button class="${state.rightTab === "board" ? "active" : ""}" data-action="right-tab" data-tab="board">Board</button>
              <button class="${state.rightTab === "plan" ? "active" : ""}" data-action="right-tab" data-tab="plan">Plan</button>
            </span>
            <span class="spacer"></span>
            ${all ? pill("All active Coordinator work", "blue") : pill(mission(state.selectedMission).revision, "blue")}
            ${pill("MCP active", "blue")}
          </div>
          ${state.rightTab === "board" ? renderBoard(all) : renderPlan()}
          ${renderInspector()}
        </section>
      `;
    }

    function renderBoard(all) {
      const visible = all ? coordinatorSessions() : coordinatorSessions(state.selectedMission);
      return `
        <div class="board">
          ${lanes.map(lane => {
            const rows = visible.filter(s => s.status === lane);
            return `
              <div class="lane">
                <div class="lane-header"><span class="dot" style="color:${laneColor(lane)}"></span>${lane}<span class="lane-count">${rows.length}</span></div>
                <div class="lane-body">
                  ${rows.length ? rows.map(s => renderWorkCard(s, all)).join("") : `<div class="empty">No sessions</div>`}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function laneColor(lane) {
      return lane === "Done" ? "var(--green)" : lane === "Needs you" ? "var(--amber)" : "var(--blue)";
    }

    function renderWorkCard(s, all) {
      return `
        <div class="work-card ${state.selectedSession === s.id ? "active" : ""}" data-action="select-session" data-id="${s.id}">
          <div class="card-title">${escapeHtml(s.title)}</div>
          <div class="chips">
            ${all ? chip(s.owner, "blue") : ""}
            ${chip(boardWorkflowLabel(s.workflow), workflowClass(s.workflow))}
            ${chip(boardPolicyLabel(s.policy))}
          </div>
        </div>
      `;
    }

    function boardWorkflowLabel(workflow) {
      if (workflow === "agent_explore") return "Explore";
      return workflow || "Agent";
    }

    function boardPolicyLabel(policy) {
      if (policy === "Read-only child") return "Read-only";
      if (policy === "Sibling on same worktree") return "Same worktree";
      return policy;
    }

    function renderPlan() {
      const m = mission(state.selectedMission);
      return `
        <div class="plan">
          ${renderMissionSummary(m)}
          ${m.workstreams.map(ws => `
            <div class="workstream">
              <div class="workstream-head">
                <div class="workstream-title">
                  <span class="workstream-name">${escapeHtml(ws.title)}</span>
                  <span class="workstream-chips">${chip(ws.role)}${chip(ws.policy, "blue")}${chip(ws.strategy)}</span>
                </div>
                <div class="workstream-purpose">${escapeHtml(ws.purpose)}</div>
              </div>
              <div class="nodes">
                ${ws.nodes.map((nodeID, idx) => renderNodeCard(m.nodes[nodeID], nodeID, idx > 0 && m.nodes[nodeID].policy.includes("Steer"))).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderNodeCard(node, nodeID, continuation) {
      return `
        <div class="node-card ${continuation ? "continuation" : ""} ${state.selectedNode === nodeID ? "active" : ""}" data-action="select-node" data-id="${nodeID}">
          <div class="node-head"><strong>${escapeHtml(node.title)}</strong><span class="spacer"></span>${pill(node.status, statusClass[node.status] || "")}</div>
          <div class="chips">
            ${chip(node.workflow, workflowClass(node.workflow))}
            ${chip(node.policy, "blue")}
            ${node.deps ? chip(`${node.deps} dependencies`) : ""}
            ${node.session ? chip("Bound session", "green") : ""}
          </div>
          <div class="node-desc">${escapeHtml(node.desc)}</div>
        </div>
      `;
    }

    function activeNode() {
      const m = mission(state.selectedMission);
      return m.nodes[state.selectedNode] || Object.values(m.nodes)[0];
    }

    function renderInspector() {
      if (state.rightTab === "plan") {
        const node = activeNode();
        const bound = node.session ? session(node.session) : null;
        return `
          <div class="inspector ${state.inspectorCollapsed ? "collapsed" : ""}">
            ${renderInspectorHandle()}
            <div class="inspector-body">
              <div class="inspector-head"><span class="pill">Plan Inspector</span><div class="inspector-title">${escapeHtml(node.title)}</div><span class="spacer"></span>${bound ? `<button class="primary-button" data-action="open-agent" data-id="${bound.id}">Open Agent</button>` : ""}</div>
              <div class="kv">
                <span>Status</span><span>${escapeHtml(node.status)}</span>
                <span>Workflow</span><span>${escapeHtml(node.workflow || "Coordinator only")}</span>
                <span>Execution policy</span><span>${escapeHtml(node.policy)}</span>
                <span>Dependencies</span><span>${node.deps}</span>
                <span>Bound session</span><span>${bound ? escapeHtml(bound.title) : "None"}</span>
                <span>Recent event</span><span>${node.status === "Running" ? "node_started" : node.status === "Completed" ? "node_completed" : "planned"}</span>
                <span>Routing decision</span><span>${bound ? escapeHtml(`Use ${bound.policy}; context is preserved in ${bound.worktree}.`) : "Coordinator-owned state update."}</span>
              </div>
            </div>
          </div>
        `;
      }
      const s = session(state.selectedSession);
      return `
        <div class="inspector ${state.inspectorCollapsed ? "collapsed" : ""}">
          ${renderInspectorHandle()}
          <div class="inspector-body">
            <div class="inspector-head"><span class="pill">Inspector</span><div class="inspector-title">${escapeHtml(s.title)}</div><span class="spacer"></span><button class="primary-button" data-action="open-agent" data-id="${s.id}">Open Agent</button></div>
            <div class="kv">
              <span>Status</span><span>${escapeHtml(s.status)}</span>
              <span>Owner Mission</span><span>${escapeHtml(s.owner || "None")}</span>
              <span>Workflow</span><span>${escapeHtml(s.workflow || "None")}</span>
              <span>Policy</span><span>${escapeHtml(s.policy)}</span>
              <span>Worktree</span><code>${escapeHtml(s.worktree)}</code>
              <span>Branch</span><code>${escapeHtml(s.branch)}</code>
            </div>
          </div>
        </div>
      `;
    }

    function renderInspectorHandle() {
      return `<button class="inspector-handle" data-action="toggle-inspector" data-drag="inspector" aria-label="${state.inspectorCollapsed ? "Expand inspector" : "Collapse inspector"}"></button>`;
    }

    function renderAgent() {
      const s = session(state.agentSession);
      const owned = subagentsFor(s.id);
      const parent = s.parentSession ? session(s.parentSession) : null;
      return `
        <section class="surface agent-shell">
          ${renderAgentSidebar()}
          <section class="panel agent-chat">
            <div class="panel-header">
              <div>
                <div class="panel-title">${escapeHtml(s.title)}</div>
                <div class="panel-sub">${escapeHtml(s.workflow || "Agent")} - ${escapeHtml(s.worktree)} - ${escapeHtml(s.branch)}</div>
              </div>
              <span class="spacer"></span>
              ${parent ? `<button class="secondary-button" data-action="select-agent-session" data-id="${parent.id}">Back to parent</button>` : s.mission ? `<button class="secondary-button" data-action="surface" data-surface="coordinator">Back to Coordinator</button>` : ""}
            </div>
            <div class="agent-transcript">
              <div class="message user"><div class="message-label">You</div><div class="message-body">${escapeHtml(agentPromptFor(s))}</div></div>
              ${s.transcript.map(text => `<div class="message"><div class="message-label">Agent</div><div class="message-body">${escapeHtml(text)}</div></div>`).join("")}
              ${owned.length ? renderSubagentPanel(owned) : ""}
              ${s.tools.map(tool => `<div class="tool-card"><span class="dot" style="color:var(--green)"></span>${escapeHtml(tool)}</div>`).join("")}
            </div>
            <div class="agent-composer">
              <div class="agent-composer-box">
                <textarea placeholder="Send a message..."></textarea>
                <div class="agent-strip">
                  ${pill("MCP", "amber")}
                  ${pill(`Codex CLI - ${s.model}`)}
                  ${pill(s.workflow || "Workflow")}
                  ${pill(s.worktree.includes("rp-agent") ? "Work locally" : "Parent checkout")}
                  ${pill("Tools")}
                  ${pill("Permissions")}
                  <button class="send">></button>
                </div>
              </div>
            </div>
          </section>
        </section>
      `;
    }

    function renderSubagentPanel(items) {
      return `
        <div class="subagent-panel">
          <div class="subagent-panel-title">Agent-owned sub-agents</div>
          ${items.map(child => `
            <div class="subagent-card ${state.agentSession === child.id ? "active" : ""}" data-action="select-agent-session" data-id="${child.id}">
              <span>
                <span class="card-title">${escapeHtml(child.title)}</span>
                <span class="card-sub">${escapeHtml(child.workflow || "Agent")} - ${escapeHtml(child.policy)}</span>
              </span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function agentPromptFor(s) {
      if (s.workflow === "Investigate") return "Read-only investigation for issue #298. Find evidence and report file references. Do not edit files.";
      if (s.workflow === "Review") return "Review the implementation worktree from a fresh session and report correctness, safety, and test coverage.";
      if (s.workflow === "Orchestrate") return "Implement issue #298 provider cleanup in the isolated worktree. Keep changes focused.";
      if (s.workflow === "agent_explore") return "Read-only probe. Return concise findings and do not edit files.";
      if (s.parentSession) return "Continue this sub-agent session. Report concise findings back to the parent agent.";
      return "Continue this Agent Mode session.";
    }

    function renderAgentSidebar() {
      const visible = sessions.filter(s => !s.parentSession);
      return `
        <aside class="panel agent-sidebar">
          <input class="search" placeholder="Search">
          <div class="rows">
            <div class="section-title"><span>Today</span></div>
            ${visible.map(renderAgentSidebarSession).join("")}
            <button class="row-button"><span class="row-leading">Z</span><span class="row-copy"><span class="row-title">Archived Sessions</span><span class="row-sub">38 archived sessions</span></span></button>
          </div>
          <div class="sidebar-footer">
            <div class="workspace-card">
              <div class="workspace-heading">
                <span>Workspace</span>
                <button class="workspace-switch">runtime-demo</button>
              </div>
              <div class="repo-list">
                <div class="repo-row">
                  <span class="row-leading">R</span>
                  <span>
                    <span class="repo-name">repoprompt-ce-coordinator-runtime-demo</span>
                    <span class="repo-branch">coordinator/runtime-demo</span>
                  </span>
                </div>
                <div class="repo-row add-folder">
                  <span class="row-leading">+</span>
                  <span>Add Folder</span>
                </div>
              </div>
            </div>
            <div class="footer-actions"><button class="ghost-button">Models</button><button class="ghost-button">Permissions</button></div>
          </div>
        </aside>
      `;
    }

    function renderAgentSidebarSession(s) {
      const children = subagentsFor(s.id);
      return `
        <button class="row-button ${state.agentSession === s.id ? "active" : ""}" data-action="select-agent-session" data-id="${s.id}">
          <span class="row-leading">${s.coordinatorChild ? "C" : "A"}</span>
          <span class="row-copy"><span class="row-title">${escapeHtml(s.title)}</span><span class="row-sub">${escapeHtml(s.coordinatorChild ? `Delegated from ${s.owner}` : "Normal Agent session")}</span></span>
        </button>
        ${children.map(child => `
          <button class="row-button child-row ${state.agentSession === child.id ? "active" : ""}" data-action="select-agent-session" data-id="${child.id}">
            <span class="row-leading">S</span>
            <span class="row-copy"><span class="row-title">${escapeHtml(child.title)}</span><span class="row-sub">${escapeHtml(`Sub-agent of ${s.title}`)}</span></span>
          </button>
        `).join("")}
      `;
    }

    function bindEvents() {
      document.querySelectorAll("[data-action]").forEach(el => {
        el.addEventListener("click", event => {
          const target = event.currentTarget;
          const action = target.dataset.action;
          if (action === "surface") state.surface = target.dataset.surface;
          if (action === "coord-dest") state.coordDestination = target.dataset.dest;
          if (action === "select-mission") {
            state.selectedMission = target.dataset.id;
            const m = mission(state.selectedMission);
            state.pace = m.pace;
            state.selectedNode = Object.keys(m.nodes)[0];
            const first = sessions.find(s => s.mission === m.id);
            if (first) state.selectedSession = first.id;
            state.coordDestination = "chat";
            state.checkpointOpen = false;
          }
          if (action === "right-tab") state.rightTab = target.dataset.tab;
          if (action === "select-session") {
            state.selectedSession = target.dataset.id;
            state.rightTab = "board";
          }
          if (action === "select-node") {
            state.selectedNode = target.dataset.id;
            const node = activeNode();
            if (node.session) state.selectedSession = node.session;
          }
          if (action === "open-agent") {
            state.agentSession = target.dataset.id;
            state.surface = "agent";
          }
          if (action === "select-agent-session") state.agentSession = target.dataset.id;
          if (action === "set-pace") {
            mission(state.selectedMission).pace = target.dataset.pace;
          }
          if (action === "toggle-checkpoint") {
            state.checkpointOpen = !state.checkpointOpen;
          }
          if (action === "toggle-inspector") {
            if (state.inspectorSuppressClick) {
              state.inspectorSuppressClick = false;
              render();
              return;
            }
            state.inspectorCollapsed = !state.inspectorCollapsed;
          }
          if (action === "approve-readme") {
            const m = mission("m-readme");
            m.approval = "Approved";
            m.status = "Running";
            m.checkpoint = "step";
            m.messages.push({ role: "coordinator", text: "Approved. I will launch the read-only README purpose probe and bind the child session to the Mission Plan node." });
            session("s-readme").status = "Working";
            state.checkpointOpen = false;
          }
          render();
        });
      });
      document.querySelectorAll("[data-drag='inspector']").forEach(el => {
        el.addEventListener("pointerdown", event => {
          state.inspectorDragY = event.clientY;
          el.setPointerCapture(event.pointerId);
        });
        el.addEventListener("pointerup", event => {
          if (state.inspectorDragY === null) return;
          const delta = event.clientY - state.inspectorDragY;
          state.inspectorDragY = null;
          if (delta > 28) {
            state.inspectorCollapsed = true;
            state.inspectorSuppressClick = true;
            render();
          } else if (delta < -28) {
            state.inspectorCollapsed = false;
            state.inspectorSuppressClick = true;
            render();
          }
        });
        el.addEventListener("pointercancel", () => {
          state.inspectorDragY = null;
        });
      });
    }

    document.getElementById("surfaceCoordinator").addEventListener("click", () => { state.surface = "coordinator"; render(); });
    document.getElementById("surfaceAgent").addEventListener("click", () => { state.surface = "agent"; render(); });
    render();
  </script>
</body>
</html>
