            <div class="tpl-card-main"><div class="tpl-name">${escapeHtml(t.name)}${t.user?` <span class="tpl-badge">yours</span>`:""}</div><div class="tpl-desc">${escapeHtml(t.brief || t.desc)}</div></div>
            <div class="tpl-card-btns"><button class="ghost-button xs" data-action="clone-template" data-id="${t.id}" title="Edit a copy">Edit</button><button class="primary-button sm" data-action="pick-template" data-id="${t.id}">${chosen?"Selected":"Use"}</button></div>
          </div>
          <div class="tpl-defaults-row">
            <span class="tpl-chip">${t.pace==="Auto"?"Auto":"Step"}</span>
            ${t.planApproval!==false ? `<span class="tpl-chip">approve plan</span>` : ""}
            ${t.mutableGate ? `<span class="tpl-chip">gate first write</span>` : ""}
            <span class="tpl-chip">closes by: ${escapeHtml(close.short)}</span>
            ${close.irreversible ? `<span class="tpl-chip warn" title="Irreversible — always confirmed">⚠ confirm ${escapeHtml(close.gate)}</span>` : ""}
            ${t.budget ? `<span class="tpl-chip">budget ${escapeHtml(String(t.budget))}</span>` : ""}
            ${skills ? `<span class="tpl-skill-inline">${skills}</span>` : ""}
          </div>
          <div class="tpl-prev-label">Director will draft from the brief:</div>
          <div class="tpl-structure">${phases}</div>
        </div>`;
      }).join("");
    }
    function renderCoordinatorComposer(m){
      const isDraft = !m;
      const executing = missionExecuting(m);
      const refine = !isDraft && canRefineStep(m);
      const refineTitle = refine ? lastCompletedNode(m).node.title : "";
      const paused = !isDraft && !executing && m.status==="Running";
      const statusText = isDraft ? "New" : (executing ? "Live" : (paused ? "Paused" : m.status));
      const statusColor = isDraft ? "var(--faint)" : (executing ? "var(--blue)" : (m.status==="Blocked" ? "var(--red)" : (paused ? "var(--amber)" : "var(--green)")));
      const prePlan = !isDraft && m && m.checkpoint === "approval" && (!m.workstreams || !m.workstreams.length);
      const placeholder = isDraft ? "Describe the Mission, then press Enter…" : ((m && m.checkpoint==="merge") ? "Paste PR feedback to address it in another pass — or Merge above to finish…" : (refine ? `Feedback to refine “${escapeHtml(refineTitle)}” — or Continue above to accept…` : (prePlan ? "Name areas to probe for better context — or Proceed above to draft…" : "Direct the mission…")));
      return `
        <div class="composer">
          <div class="composer-above">
            <span class="seg">
              <button class="${(isDraft ? state.draftPace==='Step' : (m && m.pace==='Step'))?'active':''}" data-action="set-pace" data-pace="Step">Step</button>
              <button class="${(isDraft ? state.draftPace==='Auto' : (m && m.pace==='Auto'))?'active':''}" data-action="set-pace" data-pace="Auto">Auto</button>
            </span>
            <span class="spacer"></span>
            ${isDraft
              ? `<span class="composer-tpl">Template · <strong>${escapeHtml(state.draftTemplate)}</strong></span><div class="cp-menu-wrap">${state.checkpointsMenuOpen ? renderCheckpointsMenu(null) : ""}<button class="cpill ${state.checkpointsMenuOpen?'active':''}" data-action="toggle-checkpoints-menu">Checkpoints · ${(state.draftPlanApproval?1:0) + 1 + (state.draftMutableGate?1:0)}<span class="cpill-cv">⌄</span></button></div>`
              : `<div class="cp-menu-wrap">${state.checkpointsMenuOpen ? renderCheckpointsMenu(m) : ""}<button class="cpill ${state.checkpointsMenuOpen?'active':''}" data-action="toggle-checkpoints-menu">Checkpoints · ${(m.cpPlanApproval!==false?1:0) + 1 + (m.cpMutableGate?1:0)}<span class="cpill-cv">⌄</span></button></div>`}
          </div>
          <div class="composer-box">
            <textarea ${isDraft?'id="missionDraftInput" ':'id="missionChatInput" '}placeholder="${placeholder}"></textarea>
            <div class="composer-strip">
              <button class="cpill">MCP / Tools<span class="cpill-cv">⌄</span></button>
              <button class="cpill">Permissions<span class="cpill-cv">⌄</span></button>
              <span class="spacer"></span>
              <span class="status-dot-pill"><span class="sd" style="background:${statusColor}"></span>${escapeHtml(statusText)}</span>
              ${renderSendButton(executing, isDraft ? "start-new-mission" : (executing ? undefined : "send-mission"))}
            </div>
          </div>
          <div class="hint" style="padding:6px 2px 0">${refine ? "Send feedback to refine this step before continuing — or accept it at the checkpoint above." : "This composer steers the mission. Individual runs open in Agent Mode."}</div>
        </div>`;
    }

    function renderMissionWorkPanel(m){
      return `
        <section class="panel work-panel">
          <div class="panel-header">
            <div class="topbar-left">
              <span class="tabseg">
                <button class="${state.rightTab==='plan'?'active':''}" data-action="right-tab" data-tab="plan">Plan</button>
                <button class="${state.rightTab==='board'?'active':''}" data-action="right-tab" data-tab="board">Board</button>
              </span>
            </div>
            <span class="spacer"></span>
          </div>
          <div class="work-body">
            <div class="work-stage">
              ${state.rightTab==='plan' ? renderPlan(m) : renderMissionBoard(m)}
              ${state.rightTab==='plan' && state.convoRaised ? `<div class="stage-scrim" data-action="toggle-convo"></div>` : ""}
              ${state.rightTab==='plan' ? renderTurnFloat(m) : ""}
            </div>
            ${state.inspectorOpen ? renderInspector(false) : ""}
          </div>
        </section>`;
    }

    function renderTurnFloat(m){
      const last = [...m.messages].reverse().find(x => x.role!=='user');
      const peekText = last ? (last.role==='checkpoint'
        ? (last.refine ? `↻ ${last.title} — refining` : (last.revise ? `✎ ${last.title} — plan revised` : `${last.auto?'» ':'✓ '}${last.title} — ${last.auto?'auto-approved':'approved by you'}`))
        : (last.role==='bash' ? `$ ${last.cmd}` : (last.role==='mcp' ? `MCP · ${last.tool}(${last.arg||""})` : (last.role==='skill' ? `Skill · ${last.title}` : (last.role==='evidence' ? `✓ Evidence · ${last.title}` : (last.role==='loopiter' ? `⟳ ${last.label} · ${last.note}` : (last.role==='parallel' ? `⇉ building in parallel · ${(last.items||[]).length} modules` : (last.role==='session' ? `↳ ${(session(last.id)||{}).title||'delegated session'}` : last.text)))))))) : "";
      const hasPlan = !!(m.workstreams && m.workstreams.length);
      const body = state.convoRaised
        ? `<div class="turn-float-scroll" data-chat-key="m:${m.id}">${m.messages.slice(-6).map(renderMessage).join("")}</div>`
        : (last ? `<div class="turn-float-peek"><span class="tf-text">${escapeHtml(peekText)}</span></div>` : "");
      return `
        <div class="turn-float ${state.convoRaised?'open':''}">
          <button class="tf-grab" data-action="toggle-convo" aria-label="${state.convoRaised?'Lower conversation':'Raise conversation'}"></button>
          <div class="turn-float-head">
            <button class="tf-toggle" data-action="toggle-convo"><span class="tf-title">${state.convoRaised?'Conversation':'Latest turn'}</span><span class="tf-chevron">${state.convoRaised?'▾':'▴'}</span></button>
          </div>
          ${body}
          <div class="turn-float-composer">
            <span class="tf-plan-chip">✎ Plan</span>
            <input id="planReviseInput" class="tf-input" placeholder="${hasPlan ? 'Revise the plan — add, remove, or change a step…' : 'Approve the plan first to revise it…'}" ${hasPlan?'':'disabled'}>
            ${renderSendButton(false, hasPlan ? "revise-plan" : undefined)}
          </div>
        </div>`;
    }

    function renderMissionBoard(m){
      if (!m) return `<div class="board"><div class="empty">No delegated sessions yet.<br><span class="hint">Cards appear as the mission delegates work.</span></div></div>`;
      const visible = coordinatorSessions(m.id);
      const order = ["Needs you","Working","Blocked","Done"];
      const always = new Set(["Needs you","Working","Done"]);
      const lanes = order.filter(l => always.has(l) || visible.some(s => s.status===l));
      return renderLanes(lanes, visible, false);
    }

    function renderAllAgentsWorkPanel(){
      const visible = boardSessions();   // every run you've produced — delegated + standalone, not the seeded examples
      const lanes = ["Needs you","Working","Blocked","Done"];
      return `
        <section class="panel work-panel all-board">
          <div class="panel-header">
            <div><div class="panel-title">All Agents Board</div><div class="panel-sub">Every agent run — delegated and standalone</div></div>
            <span class="spacer"></span>
          </div>
          <div class="work-body">
            <div class="work-stage">${renderLanes(lanes, visible, true)}</div>
            ${state.inspectorOpen ? renderInspector(true) : ""}
          </div>
        </section>`;
    }

    function renderLanes(lanes, visible, all){
      return `<div class="board">
        ${lanes.map(lane => {
          const rows = visible.filter(s => s.status === lane);
          return `<div class="lane">
            <div class="lane-header"><span class="dot" style="color:${laneColor(lane)}"></span>${lane}<span class="lane-count">${rows.length}</span></div>
            <div class="lane-body">${rows.length ? rows.map(s => renderWorkCard(s, all)).join("") : `<div class="empty">No sessions</div>`}</div>
          </div>`;
        }).join("")}
      </div>`;
    }

    function renderWorkCard(s, all){
      const accent = s.status==="Needs you" ? "attention" : (s.status==="Review" ? "review" : "");
      return `
        <div class="work-card ${accent} ${state.selectedSession===s.id?'active':''}" data-action="select-session" data-id="${s.id}">
          <div class="card-head">
            ${statusPlate(plateStateForSession(s), 'session', s.worktree)}
            <span class="card-title">${escapeHtml(s.title)}</span>
          </div>
          <div class="chips">
            ${all ? chip(s.owner, "owner") : ""}
            ${chip(s.workflow || "Agent", workflowClass(s.workflow))}
            ${s.reviewable ? `<span class="chip preview-chip">Preview ready</span>` : ""}
          </div>
        </div>`;
    }

    function renderPlan(m){
      if (!m || !m.workstreams || m.workstreams.length === 0) return `<div class="plan"><div class="empty">No Mission Plan yet.<br><span class="hint">Approve the mission checkpoint to draft the plan.</span></div></div>`;
      return `<div class="plan">
        ${m.planOverview ? `<div class="plan-overview md"><div class="plan-overview-tag">Plan overview</div>${mdToHtml(m.planOverview)}</div>` : ""}
        ${renderEvidenceLedger(m)}
        ${m.workstreams.map(ws => renderWorkstream(ws, m)).join("")}
      </div>`;
    }
    // Accumulating evidence — every completed step adds proof the whole mission (and every later agent) inherits.
    function renderEvidenceLedger(m){
      const ev = m.evidence || [];
      const total = missionNodeList(m).filter(x => !x.node.coordinatorDirect).length;
      return `<div class="ledger">
        <div class="ledger-head"><span class="ledger-tag">Mission evidence</span><span class="ledger-sub">accumulates as steps clear their bar — inherited by later steps</span><span class="spacer"></span><span class="ledger-count">${ev.length}${total?`/${total}`:''}</span></div>
        ${ev.length
          ? `<div class="ledger-body">${ev.map(e => `<div class="ledger-row"><span class="ev-ic">✓</span><span class="ledger-node">${escapeHtml(e.node)}</span><span class="ledger-text">${escapeHtml(e.text)}</span></div>`).join("")}</div>`
          : `<div class="ledger-empty">No evidence yet — it fills in as each step returns proof it met its bar.</div>`}
      </div>`;
    }

    function workstreamDone(ws, m){ return ws.nodes.length > 0 && ws.nodes.every(id => m.nodes[id] && m.nodes[id].status === "Completed"); }
    function workstreamIsOpen(ws, m){ const v = state.workstreamOpen[ws.id]; return v === undefined ? !workstreamDone(ws, m) : v; }

    function renderWorkstream(ws, m){
      const done = workstreamDone(ws, m);
      const open = workstreamIsOpen(ws, m);
      const doneCount = ws.nodes.filter(id => m.nodes[id] && m.nodes[id].status === "Completed").length;
      const statusEl = done
        ? `<span class="chip green">✓ ${doneCount}/${ws.nodes.length}</span>`
        : `<span class="ws-count">${doneCount}/${ws.nodes.length}</span>`;
      return `
        <div class="workstream ${done?'done':''}">
          <div class="workstream-head" data-action="toggle-workstream" data-id="${ws.id}">
            <span class="ws-chevron">${open?'▾':'▸'}</span>
            <div class="workstream-title-wrap">
              <div class="workstream-title"><span class="workstream-name">${escapeHtml(ws.title)}</span>
              <span class="workstream-chips">${chip(ws.role)}${chip(ws.policy,"blue")}${chip(ws.strategy)}</span></div>
              ${open ? `<div class="workstream-purpose">${escapeHtml(ws.purpose)}</div>` : ""}
            </div>
            <span class="ws-status">${statusEl}</span>
          </div>
          ${open ? `<div class="nodes">${renderNodeGroups(ws, m)}</div>` : ""}
        </div>`;
    }
    // Group parallel siblings (same explicit `after`) into a band; flag convergence nodes (deps on 2+ branches).
    function renderNodeGroups(ws, m){
      const items = ws.nodes.map(id => ({ id, node: m.nodes[id] })).filter(x => x.node);
      const groups = [];
      items.forEach(it => {
        const sig = it.node.after ? JSON.stringify(it.node.after) : null;
        const prev = groups[groups.length - 1];
        if (sig !== null && prev && prev.sig === sig) prev.items.push(it); else groups.push({ sig, items: [it] });
      });
      return groups.map(g => {
        if (g.items.length > 1) {
          return `<div class="node-parallel"><div class="node-parallel-tag">⇉ ${g.items.length} steps run in parallel</div>${g.items.map(it => renderNodeCard(it.node, it.id)).join("")}</div>`;
        }
        const it = g.items[0];
        const conv = (it.node.after && it.node.after.length > 1) ? `<div class="node-converge">↳ converges ${it.node.after.length} branches</div>` : "";
        return conv + renderNodeCard(it.node, it.id);
      }).join("");
    }

    function renderNodeCard(node, id){
      if (!node) return "";
      return `
        <div class="node-card ${node.added?'added ':''}${state.selectedNode===id && state.rightTab==='plan'?'active':''}" data-action="select-node" data-id="${id}">
          <div class="node-head"><strong>${escapeHtml(node.title)}</strong><span class="spacer"></span>${pill(node.status, statusClass[node.status]||"")}</div>
          <div class="chips">
            ${node.added ? chip("✎ New step","purple") : ""}
            ${chip(node.workflow, workflowClass(node.workflow))}
            ${chip(node.policy,"blue")}
            ${node.deps ? chip(`${node.deps} deps`) : ""}
            ${node.subtasks ? chip(`${node.subtasks.length} sub-tasks`,"blue") : ""}
            ${node.gate ? chip("Requires approval","amber") : ""}
            ${node.coordinatorDirect ? chip("Director-direct","")
              : node.steerOf ? chip("Steers prior session","blue")
              : node.session ? chip("Bound session","green")
              : chip("Plan intent only")}
          </div>
          <div class="node-why">↳ ${escapeHtml(policyRationale(node))}</div>
          ${(() => { const w = worktreeFor(node, mission(state.selectedMission)); return `<div class="node-wt">⌥ <span class="node-wt-label">${escapeHtml(w.label)}</span>${w.note?` · ${escapeHtml(w.note)}`:''}</div>`; })()}
          ${node.loop ? `<div class="node-loop ${node.loop.kind==='batch'?'batch':''}">${node.loop.kind==='batch' ? `▦ verified batch · ${node.loop.trail.length} planned steps (revert red)` : `⟳ iterative · stop: ${escapeHtml(node.loop.stop)}`}</div>` : ''}
          ${(() => { const de = nodeDoneEvidence(node); return `<div class="node-dod"><span class="node-dod-k">Done when</span> ${escapeHtml(de.done)}</div>${node.status==='Completed' ? `<div class="node-ev"><span class="ev-ic">✓</span> ${escapeHtml(de.evidence)}</div>` : ''}`; })()}
          <div class="node-desc md">${mdToHtml(node.desc)}</div>
          ${node.detail ? `<div class="node-detail md">${mdToHtml(node.detail)}</div>` : ""}
        </div>`;
    }

    function renderInspector(all){
      const planMode = !all && state.rightTab === "plan";
      if (planMode) {
        const m = mission(state.selectedMission);
        const nodeId = m ? (m.nodes[state.selectedNode] ? state.selectedNode : Object.keys(m.nodes)[0]) : null;
        const node = nodeId ? m.nodes[nodeId] : null;
        const bound = node && node.session ? session(node.session) : null;
        const ws = workstreamForNodeId(m, nodeId);
        return `
          <div class="inspector">
            <button class="inspector-handle" data-action="close-inspector" aria-label="Hide inspector"></button>
            <div class="inspector-body">
              <div class="inspector-head"><div class="inspector-head-row"><span class="pill">Plan Inspector</span><span class="spacer"></span>${bound?inspectorOpenButton(bound):`<span class="hint">Plan intent — no session yet</span>`}</div><div class="inspector-title">${escapeHtml(node?node.title:'—')}</div></div>
              <div class="kv">
                <span>Status</span><span>${escapeHtml(node?node.status:'—')}</span>
                <span>Workstream</span><span>${ws?escapeHtml(ws.title):'—'}</span>
                <span>Workflow hint</span><span>${escapeHtml(node?(node.workflow||'Plan only'):'—')}</span>
                <span>Execution policy</span><span>${escapeHtml(node?node.policy:'—')}</span>
                <span>Why</span><span>${node?escapeHtml(policyRationale(node)):'—'}</span>
                <span>Worktree</span><span>${node?(() => { const w = worktreeFor(node, m); return escapeHtml(w.label) + (w.note?` · ${escapeHtml(w.note)}`:''); })():'—'}</span>
                <span>Done when</span><span>${node?escapeHtml(nodeDoneEvidence(node).done):'—'}</span>
                ${node && node.status==='Completed' ? `<span>Evidence</span><span>✓ ${escapeHtml(nodeDoneEvidence(node).evidence)}</span>` : ''}
                <span>Dependencies</span><span>${node?node.deps:0}</span>
                <span>Bound session</span><span>${bound?`<button class="link-button" data-action="select-session" data-id="${bound.id}">${escapeHtml(bound.title)} →</button>`:'None (plan-intent only)'}</span>
              </div>
            </div>
          </div>`;
      }
      const s = session(state.selectedSession) || coordinatorSessions()[0];
      const sm = s ? missionForSession(s) : null;
      const sNode = (s && sm) ? planNodeForSession(sm, s.id) : null;
      const sWs = (sm && sNode) ? workstreamForNodeId(sm, sNode.id) : null;
      const live = s ? isLiveChild(s) : false;
      return `
        <div class="inspector">
          <button class="inspector-handle" data-action="close-inspector" aria-label="Hide inspector"></button>
          <div class="inspector-body">
            <div class="inspector-head"><div class="inspector-head-row"><span class="pill">Inspector</span><span class="spacer"></span>${s?inspectorOpenButton(s):''}</div><div class="inspector-title">${escapeHtml(s?s.title:'—')}</div></div>
            <div class="kv">
              <span>Board group</span><span>${escapeHtml(s?s.status:'—')}${s&&s.status==='Done'?' · terminal, not accepted':''}</span>
              <span>Run state</span><span>${escapeHtml(s?runStateLabel(s.runState):'—')}</span>
              <span>Owner Mission</span><span>${escapeHtml(s?(s.owner||'None'):'—')}</span>
              <span>Workstream</span><span>${sWs?escapeHtml(sWs.title):'<span class="hint">Not in plan</span>'}</span>
              <span>Plan node</span><span>${sNode?`<button class="link-button" data-action="open-plan-node" data-mission="${sm.id}" data-id="${sNode.id}">${escapeHtml(sNode.node.title)} →</button>`:'<span class="hint">No bound node</span>'}</span>
              <span>Worktree</span><span>${s?worktreeDot(s.worktree):''}<code>${escapeHtml(s?s.worktree:'—')}</code></span>
              <span>Branch</span><span><code>${escapeHtml(s?s.branch:'—')}</code></span>
            </div>
            ${s&&s.reviewable?`<div class="reply-meta">${escapeHtml(s.preview||'Preview ready')}</div>`:''}
            ${s && s.transcript && s.transcript.length ? `<div class="inspector-latest"><div class="inspector-latest-label">Latest from this session${live?' · live':''}</div><div class="inspector-latest-body">${escapeHtml(s.transcript[s.transcript.length-1])}</div></div>` : ''}
          </div>
        </div>`;
    }

    /* ---------------- Agent surface (sessions only) ---------------- */

    function renderAgent(){
      if (state.agentSelection === "start") return renderAgentStart();
      const s = session(state.agentSession) || sessions[0];
      const owned = subagentsFor(s.id);
      const ownerMission = s.mission ? mission(s.mission) : null;
      return `
        <section class="surface agent-shell">
          ${renderAgentSidebar()}
          <section class="panel agent-chat">
            <div class="chat-top">
              <div class="panel-header">
                <div><div class="panel-title">${escapeHtml(s.title)}</div><div class="panel-sub">${escapeHtml(s.worktree)} · ${escapeHtml(s.branch)}</div></div>
              </div>
              ${ownerMission ? `<div class="attribution-bar"><span class="dot" style="color:var(--blue)"></span><span>Delegated by Mission · <strong style="color:var(--text)">${escapeHtml(ownerMission.title)}</strong></span><span class="spacer"></span><button class="secondary-button" data-action="back-to-mission" data-id="${ownerMission.id}">Open Mission →</button></div>` : ""}
            </div>
            <div class="agent-transcript" data-chat-key="s:${s.id}">
              <div class="wf-row">${s.workflow?`<span class="chip ${workflowClass(s.workflow)}">${escapeHtml(s.workflow)}</span>`:`<span class="chip">Agent</span>`}${ownerMission?`<span class="wf-from">delegated by ${escapeHtml(ownerMission.title)}</span>`:''}</div>
              <div class="message user"><div class="message-label">You</div><div class="message-body">${escapeHtml(agentPromptFor(s))}</div></div>
              ${s.transcript.map(t => (t && typeof t === "object")
                ? ((t.role === "bash" || t.role === "mcp") ? renderMessage(t)
                  : `<div class="message steer"><div class="message-label">↳ Director steered this session</div><div class="message-body">${escapeHtml(t.text)}</div></div>`)
                : `<div class="message"><div class="message-label">Agent</div><div class="message-body">${escapeHtml(t)}</div></div>`).join("")}
              ${owned.length ? renderSubagentPanel(owned) : ""}
              ${s.tools.map(t => `<div class="tool-card"><span class="dot" style="color:var(--green)"></span>${escapeHtml(t)}</div>`).join("")}
            </div>
            <div class="agent-composer">
              <div class="composer-above">
                <button class="cpill">${escapeHtml(s.workflow || "Workflow")}<span class="cpill-cv">⌄</span></button>
                <button class="cpill">Interview</button>
                <button class="cpill">Work locally<span class="cpill-cv">⌄</span></button>
              </div>
              <div class="agent-composer-box">
                <textarea placeholder="Send a message…"></textarea>
                <div class="agent-strip">
                  <button class="cpill">Codex CLI · ${escapeHtml(s.model)}<span class="cpill-cv">⌄</span></button>
                  <button class="cpill">High<span class="cpill-cv">⌄</span></button>
                  <button class="cpill">Tools<span class="cpill-cv">⌄</span></button>
                  <button class="cpill">Permissions · Auto Review<span class="cpill-cv">⌄</span></button>
                  <span class="spacer"></span>
                  <button class="attach-btn" title="Attach image" aria-label="Attach image"><svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="12" height="10" rx="2"/><circle cx="5.8" cy="6.4" r="1.1"/><path d="M2.6 12l3.4-3.2L8.4 11l2-1.8L14 12"/></svg></button>
                  ${renderSendButton(s.runState==="running")}
                </div>
              </div>

    let newSessionSeq = 1;
    function startNewSession(){
      const input = document.getElementById("agentStartInput");
      const text = input ? input.value.trim() : "";
      if (!text) return false;
      const id = "s-new-" + (newSessionSeq++);
      sessions.unshift({
        id, mission: null, owner: null,
        title: text.length > 46 ? text.slice(0, 46) + "…" : text,
        userPrompt: text,
        status: "Working", runState: "running", workflow: null, policy: "Normal Agent session",
        worktree: "current checkout", branch: "agent/new-session", model: "gpt-5.5",
        transcript: [
          "On it — reading the relevant files to get oriented before making changes.",
          "Here's my plan. I'll summarize the proposed edits and check with you before applying anything."
        ],
        tools: ["Read File", "Search", "Plan"]
      });
      state.surface = "agent";
      state.agentSelection = "session";
      state.agentSession = id;
      return true;
    }

    let newMissionSeq = 1;
    function startNewMission(){
      const input = document.getElementById("missionDraftInput");
      const text = input ? input.value.trim() : "";
      if (!text) return false;
      const id = "m-new-" + (newMissionSeq++);
      const title = text.length > 44 ? text.slice(0, 44) + "…" : text;
      const issueMatch = text.match(/#\d+/);                    // ground on an issue ONLY if the directive references one
      const issueRef = issueMatch ? issueMatch[0] : null;
      const planApproval = state.draftPlanApproval !== false;
      const tpl = templateByName(state.draftTemplate || "Scoped Change");
      const skillList = effectiveSkills(tpl).map(s => "/" + s).join(", ") || "the repo's conventions";
      // Grounding is open — pull whatever's relevant from available tools; a referenced issue is one source, not a requirement.
      const grounding = [
        { role: "user", text: text },
        { role: "skill", title: skillList, note: "context for this mission" }
      ];
      if (issueRef) grounding.push({ role: "mcp", server: "RepoPromptCE", tool: "get_issue", arg: issueRef, output: issueContextFor(issueRef, text) });
      const groundLine = issueRef
        ? `Read ${skillList} and pulled ${issueRef} for context.`
        : `Read ${skillList}. No issue referenced — grounding on your directive and pulling repo context as I plan.`;
      grounding.push({ role: "coordinator", text: `${groundLine} No plan exists yet — approve the mission checkpoint and I'll draft the ${tpl.name} plan from it.` });
      const mObj = {
        id, pinned: false,
        title,
        subtitle: "New mission", status: "Draft", approval: "Awaiting approval", revision: "r1",
        objective: text, autoDemo: true,
        template: state.draftTemplate || "Scoped Change", pace: state.draftPace || "Step", checkpoint: "approval",
        cpPlanApproval: planApproval, cpMutableGate: !!state.draftMutableGate,
        messages: grounding,
        workstreams: [],
        nodes: {}
      };
      missions.unshift(mObj);
      if (!planApproval) {
        // Plan approval off: skip the approval checkpoint — draft the plan and run straight through (Auto runs to the merge; Step pauses at step 1).
        mObj.messages[mObj.messages.length-1] = { role: "coordinator", text: `${groundLine} Plan approval is off — drafting the ${tpl.name} plan and running ${mObj.pace==="Auto"?"straight through":"it now; on Step I'll pause at each step"}.` };
        mObj.approval = "Approved"; mObj.status = "Running";
        draftPlanForMission(mObj);
        mObj.messages.push({ role: "coordinator", text: `Drafted the ${tpl.name} plan — ${missionNodeList(mObj).map(x=>x.node.title).slice(0,3).join(", ")}, …` });
        mObj.checkpoint = "step";
      }
      state.surface = "coordinator";
      state.coordView = "mission";
      state.newMissionDraft = false;
      state.selectedMission = id;
      state.missionView = "talk";
      state.inspectorOpen = false;
      state.convoRaised = false;
      state.checkpointOpen = false;
      state.checkpointChoice = null;
      state.selectedNode = null;
      return true;
    }

    function agentPromptFor(s){
      if (s.userPrompt) return s.userPrompt;
      if (s.workflow === "Investigate") return "Read-only investigation for issue #298. Report file references. Do not edit files.";
      if (s.workflow === "Validation") return "Validate the implementation worktree from a fresh session and report correctness and test coverage.";
      if (s.workflow === "Orchestrate") return "Implement issue #298 provider cleanup in the isolated worktree. Keep changes focused.";
      if (s.workflow === "Explore") return "Read-only probe. Return concise findings and do not edit files.";
      if (s.parentSession) return "Continue this sub-agent session. Report concise findings back to the parent agent.";
      return "Continue this Agent Mode session.";
    }

    function renderAgentSidebar(){

    function renderSubagentPanel(items){

    /* ---------------- Events ---------------- */

    function bindEvents(){
      document.querySelectorAll("[data-action]").forEach(el => {
        el.addEventListener("click", e => {
          const t = e.currentTarget, a = t.dataset.action;
          if (a === "start-new-session") { if (startNewSession()) render(); return; }
          if (a === "start-new-mission") { if (startNewMission()) render(); return; }
          if (a === "checkpoint-option") state.checkpointChoice = t.dataset.key;
          if (a === "checkpoint-confirm") { const cm = mission(state.selectedMission); if (cm) advanceMissionCheckpoint(cm); }
          if (a === "send-mission") { if (sendMissionMessage()) render(); return; }
          if (a === "revise-plan") { if (sendPlanRevision()) render(); return; }
          if (a === "toggle-checkpoints-menu") state.checkpointsMenuOpen = !state.checkpointsMenuOpen;
          if (a === "toggle-cp-mutable") {
            if (state.newMissionDraft) { state.draftMutableGate = !state.draftMutableGate; }
            else { const cm = mission(state.selectedMission); if (cm) { cm.cpMutableGate = !cm.cpMutableGate; if (cm.nodes) Object.keys(cm.nodes).forEach(k => { if (cm.nodes[k].mutableBoundary) cm.nodes[k].gate = cm.cpMutableGate; }); } }
          }
          if (a === "toggle-cp-approval") {
            if (state.newMissionDraft) { state.draftPlanApproval = !state.draftPlanApproval; }
            else {
              const cm = mission(state.selectedMission);
              if (cm) {
                cm.cpPlanApproval = (cm.cpPlanApproval === false);   // flip: undefined/true -> false, false -> true
                // if you turn approval OFF while the plan is still waiting on it, run straight through now
                if (cm.cpPlanApproval === false && cm.checkpoint === "approval") {
                  state.checkpointsMenuOpen = false; state.checkpointChoice = "proceed"; advanceMissionCheckpoint(cm);
                }
              }
            }
          }
          if (a === "surface-coordinator") state.surface = "coordinator";
          if (a === "surface-agent") state.surface = "agent";
          if (a === "coord-view-mission") { state.surface="coordinator"; state.coordView = "mission"; state.newMissionDraft = false; }
          if (a === "coord-view-all") { state.surface="coordinator"; state.coordView = "all"; state.rightTab = "board"; state.inspectorOpen = false; }
          if (a === "coord-view-decisions") { state.surface="coordinator"; state.coordView = "decisions"; state.inspectorOpen = false; }
          if (a === "open-decision") {
            const mid = t.dataset.mission, sid = t.dataset.session;
            state.surface="coordinator"; state.coordView="mission"; state.newMissionDraft=false; state.selectedMission = mid; state.convoRaised = false; state.checkpointChoice = null;
            if (sid) {
              state.missionView="work"; state.inspectorOpen=true; state.selectedSession=sid;
              const m=mission(mid); const node=m?planNodeForSession(m,sid):null;
              if (node) { state.selectedNode=node.id; state.rightTab="plan"; } else { state.rightTab="board"; }
            } else {
              state.missionView="talk"; state.inspectorOpen=false;
            }
          }
          if (a === "select-mission") {
            state.coordView = "mission"; state.newMissionDraft = false; state.selectedMission = t.dataset.id;
            const m = mission(state.selectedMission);
            state.missionView = "talk"; state.inspectorOpen = false;
            state.rightTab = "board"; state.checkpointOpen = false; state.checkpointChoice = null; state.gateArmed = false;
            const first = coordinatorSessions(m.id)[0]; if (first) state.selectedSession = first.id;
            state.selectedNode = Object.keys(m.nodes)[0];
          }
          if (a === "new-mission") { state.surface="coordinator"; state.coordView="mission"; state.newMissionDraft = true; state.missionView = "talk"; state.inspectorOpen = false; state.checkpointChoice = null; state.draftPace = "Step"; state.draftPlanApproval = true; state.draftMutableGate = false; state.checkpointsMenuOpen = false; state.templatePickerOpen = false; state.templateEditorOpen = false; state.editorDraft = null; state.gateArmed = false; }
          if (a === "new-session") { state.surface="agent"; state.agentSelection = "start"; }
          if (a === "right-tab") state.rightTab = t.dataset.tab;
          if (a === "focus-plan") state.rightTab = "plan";
          if (a === "select-session") { state.selectedSession = t.dataset.id; state.rightTab = "board"; if (state.coordView==='mission') state.missionView = "work"; state.inspectorOpen = true; state.convoRaised = false; }   // select row -> summon inspector in Work
          if (a === "open-session-plan") {
            const sid = t.dataset.id;
            const m = mission(state.selectedMission);
            state.surface = "coordinator"; state.coordView = "mission"; state.newMissionDraft = false;
            state.missionView = "work"; state.inspectorOpen = true; state.convoRaised = false;
            state.selectedSession = sid;
            const node = m ? planNodeForSession(m, sid) : null;
            if (node) { state.selectedNode = node.id; state.rightTab = "plan"; }
            else { state.rightTab = "board"; }
          }
          if (a === "select-node") {
            state.selectedNode = t.dataset.id; state.rightTab = "plan"; state.inspectorOpen = true;
            const m = mission(state.selectedMission); const node = m && m.nodes[t.dataset.id];
            if (node && node.session) state.selectedSession = node.session;
          }
          if (a === "open-plan-node") {
            state.surface = "coordinator"; state.coordView = "mission"; state.newMissionDraft = false;
            state.missionView = "work"; state.inspectorOpen = true; state.convoRaised = false;
            if (t.dataset.mission) state.selectedMission = t.dataset.mission;
            state.selectedNode = t.dataset.id; state.rightTab = "plan";
            const m = mission(state.selectedMission); const node = m && m.nodes[t.dataset.id];
            if (node && node.session) state.selectedSession = node.session;
          }
          if (a === "open-agent") { state.surface = "agent"; state.agentSelection = "session"; state.agentSession = t.dataset.id; }
          if (a === "back-to-mission") {
            const mid = t.dataset.id;
            state.surface = "coordinator"; state.coordView = "mission"; state.newMissionDraft = false;
            state.selectedMission = mid; state.missionView = "talk"; state.inspectorOpen = false; state.convoRaised = false;
            const bm = mission(mid); const sid = state.agentSession;
            const entry = (bm && sid) ? planNodeForSession(bm, sid) : null;
            if (sid) { state.selectedSession = sid; state.scrollToSession = sid; if (entry) state.selectedNode = entry.id; }
          }
          if (a === "select-agent-session") { state.agentSelection = "session"; state.agentSession = t.dataset.id; }
          if (a === "set-pace") { if (state.newMissionDraft) { state.draftPace = t.dataset.pace; } else { const m = mission(state.selectedMission); if (m) m.pace = t.dataset.pace; } }
          if (a === "toggle-checkpoint") state.checkpointOpen = !state.checkpointOpen;
          if (a === "toggle-archived") state.archivedMissionsOpen = !state.archivedMissionsOpen;
          if (a === "toggle-agent-examples") state.agentExamplesOpen = !state.agentExamplesOpen;
          if (a === "pick-template") { const tpl = MISSION_TEMPLATES.find(x => x.id === t.dataset.id); if (tpl) { state.draftTemplate = tpl.name; applyTemplateDefaults(tpl); } }
          if (a === "open-template-editor") { state.editorDraft = blankTemplate(); state.templateEditorOpen = true; }
          if (a === "clone-template") { state.editorDraft = editorFromTemplate(t.dataset.id); state.templateEditorOpen = true; }
          if (a === "close-template-editor") { state.templateEditorOpen = false; state.editorDraft = null; }
          if (a === "editor-set-pace") { if (state.editorDraft) state.editorDraft.pace = t.dataset.pace; }

          if (a === "editor-toggle-gate") { if (state.editorDraft) state.editorDraft.mutableGate = !state.editorDraft.mutableGate; }
          if (a === "editor-preview") { /* re-render refreshes the preview + inferred terminal from the synced brief/done */ }
          if (a === "editor-save") {
            const d = state.editorDraft;
            if (d) {
              const name = ((d.name||"").trim()) || "Untitled flow";
              const pins = (d.skillsRaw||"").split(",").map(s => s.trim().replace(/^\//,"")).filter(Boolean);
              const skills = Array.from(new Set([...inferSkillsFromBrief(d.brief), ...pins]));   // effective = inferred ∪ pinned
              const budget = (d.budget||"").toString().trim();
              const tpl = { id:"user-"+slug(name)+"-"+(userTplSeq++), name, desc:((d.desc||d.brief||"Custom flow.").trim()), brief:(d.brief||"").trim(), done:(d.done||"").trim(), icon:"spark", user:true,
                skills, pins, vars:["$mission","$workflow","$skill"], pace:d.pace||"Step", planApproval:d.planApproval!==false, mutableGate:!!d.mutableGate, terminal:terminalFromDone(d.done), budget: budget||null };
              const existing = MISSION_TEMPLATES.findIndex(x => x.user && x.name === tpl.name);
              if (existing >= 0) MISSION_TEMPLATES[existing] = tpl; else MISSION_TEMPLATES.push(tpl);
              state.draftTemplate = tpl.name; applyTemplateDefaults(tpl);   // select + pre-load its defaults
              state.templateEditorOpen = false; state.editorDraft = null;
            }
          }
          if (a === "toggle-workstream") {
            const id = t.dataset.id;
            const m = mission(state.selectedMission);
            const ws = m && m.workstreams.find(w => w.id === id);
            const done = ws ? ws.nodes.every(nid => m.nodes[nid] && m.nodes[nid].status === "Completed") : false;
            const cur = state.workstreamOpen[id] === undefined ? !done : state.workstreamOpen[id];
            state.workstreamOpen[id] = !cur;
          }
          if (a === "close-inspector") state.inspectorOpen = false;
          if (a === "open-work") { state.missionView = "work"; state.rightTab = "plan"; state.convoRaised = false; }
          if (a === "show-chat") state.missionView = "talk";
          if (a === "toggle-convo") state.convoRaised = !state.convoRaised;
          if (a === "approve-mission") {
            const mm = mission(t.dataset.id);
            if (mm) {
              mm.approval = "Approved"; mm.status = "Running"; mm.checkpoint = "step";

      const startInput = document.getElementById("agentStartInput");

        });
      }
      const draftInput = document.getElementById("missionDraftInput");
      if (draftInput) {
        draftInput.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (startNewMission()) render(); }
        });
      }
      ["missionChatInput","missionFloatInput"].forEach(idn => {
        const node = document.getElementById(idn);
        if (node) node.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (sendMissionMessage()) render(); }
        });
      });
      const planRev = document.getElementById("planReviseInput");
      if (planRev) planRev.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (sendPlanRevision()) render(); }
      });
      // Template editor: keep state synced on each keystroke WITHOUT re-rendering (so inputs keep focus).
      if (state.templateEditorOpen && state.editorDraft) {
        const d = state.editorDraft;
        const bindText = (id, set) => { const el = document.getElementById(id); if (el) el.addEventListener("input", e => set(e.target.value)); };
        bindText("tplEditName", v => d.name = v);
        bindText("tplEditSkills", v => d.skillsRaw = v);
        bindText("tplEditBudget", v => d.budget = v);
        const brief = document.getElementById("tplEditBrief");
        if (brief) {
          brief.addEventListener("input", e => { d.brief = e.target.value; });
          // Cmd/Ctrl+Enter refreshes the preview from the brief
          brief.addEventListener("keydown", e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); render(); } });
        }
        const done = document.getElementById("tplEditDone");
        if (done) {
          done.addEventListener("input", e => { d.done = e.target.value; });
          done.addEventListener("keydown", e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); render(); } });
        }
      }
    }

    render();
  </script>
</body>
</html>
