            ${(() => { if (isDraft || !m || m.status !== "Running") return ""; const rn = missionNodeList(m).filter(x => x.node.status === "Running").length; return rn ? `<span class="cap-stat" title="Flight cap — the policy allows at most ${m.maxConcurrent || 3} sessions in flight; ready steps beyond it wait">running ${rn}/${m.maxConcurrent || 3}</span>` : ""; })()}
            <span class="seg" title="Who answers workers' questions — Me: they stop for you with a drafted answer; Director: answered from mission context (⚙ carded). Governs future questions; a raised one stays raised.">
              <button class="${(isDraft ? (state.draftAutonomy && state.draftAutonomy.childAsk) !== 'auto' : (m && askOn(m, 'childAsk')))?'active':''}" data-action="set-childask" data-mode="ask">Me</button>
              <button class="${(isDraft ? (state.draftAutonomy && state.draftAutonomy.childAsk) === 'auto' : (m && !askOn(m, 'childAsk')))?'active':''}" data-action="set-childask" data-mode="auto">Director</button>
            </span>
            <span class="spacer"></span>
            ${isDraft
              ? `<span class="composer-tpl">Policy · <strong>${escapeHtml(state.draftPolicy)}</strong></span><span class="always-note" title="Not settings in this demo — plan approval and anything irreversible always stop for you">always asks: plan · merges</span>`
              : `<span class="always-note" title="Not settings in this demo — plan approval and anything irreversible always stop for you">always asks: plan · merges</span>`}
          </div>
          <div class="composer-box">
            <textarea ${isDraft?'id="missionDraftInput" ':'id="missionChatInput" '}placeholder="${placeholder}"></textarea>
            <div class="composer-strip">
              <button class="cpill">MCP / Tools<span class="cpill-cv">⌄</span></button>
              <button class="cpill">Permissions<span class="cpill-cv">⌄</span></button>
              <span class="spacer"></span>
              <span class="status-dot-pill"><span class="sd" style="background:${statusColor}"></span>${escapeHtml(statusText)}</span>
              ${renderSendButton(executing, isDraft ? "start-new-mission" : (executing ? undefined : "send-mission"))}
            </div>
          </div>
          <div class="hint" style="padding:6px 2px 0">${isDraft ? `<strong>Your words choose the plan</strong> — the Director infers the mission's shape from the directive (a metric to improve → measured loop · "investigate… file an issue" → read-only root-cause · "across modules" → spec-first · "+ as a stack, one PR per module" → one PR per module · "here's the PRD, work the slices" → per-slice plan → build → review chains, you review at the end). The <em>policy</em> chooses how much stops for you on that plan. The ▸ Try chips prefill both — press Enter to send.` : (refine ? "Send feedback to refine this step before continuing — or accept it at the checkpoint above." : "This composer steers the mission. Individual runs open in Agent Mode.")}</div>
        </div>`;
    }

    function renderMissionPlanPane(m){
      // The right half of the persistent split. The plan IS the board at mission scale (nodes carry session,
      // status, evidence); plan editing lives where the plan lives (the ✎ revise input below); the SESSION
      // inspector overlays this pane on selection — node detail lives in the expanding cards, so there is no
      // separate plan-node inspector anymore.
      const hasPlan = !!(m.workstreams && m.workstreams.length);
      if (state.planDrafting === m.id) {
        return `
        <section class="panel work-panel plan-pane">
          <div class="panel-header">
            <div><div class="panel-title">Mission Plan</div><div class="panel-sub">Drafting the ${escapeHtml(m.shape || "mission")} plan — sequencing the steps…</div></div>
          </div>
          <div class="work-body"><div class="work-stage"><div class="plan plan-skel">
            <div class="skel skel-wide"></div>
            <div class="skel skel-lane"></div><div class="skel skel-card"></div>
            <div class="skel skel-lane"></div><div class="skel skel-card"></div><div class="skel skel-card"></div>
            <div class="skel skel-lane"></div><div class="skel skel-card"></div>
          </div></div></div>
        </section>`;
      }
      if (state.receiptOpen && m.status === "Completed") {
        const r = missionReceiptData(m);
        return `
        <section class="panel work-panel plan-pane">
          <div class="panel-header">
            <div><div class="panel-title">Mission Receipt</div><div class="panel-sub">The accountable record — contract, decisions, evidence, close</div></div>
            <span class="spacer"></span>
            <span class="seg"><button data-action="toggle-receipt">Plan</button><button class="active">Receipt</button></span>
            <button class="ghost-button" data-action="copy-receipt" title="Copy the receipt as Markdown">Copy Markdown</button>
          </div>
          <div class="work-body"><div class="work-stage"><div class="plan receipt">
            <div class="receipt-sec"><div class="receipt-tag">Mission</div>
              <div class="receipt-line"><strong>${escapeHtml(r.title)}</strong> · ${escapeHtml(r.shape)} · ${escapeHtml(r.status)}</div>
              <div class="receipt-line dim">${escapeHtml(r.objective)}</div></div>
            <div class="receipt-sec"><div class="receipt-tag">Contract</div>
              <div class="receipt-line">${escapeHtml(r.contract.policy)} policy · ${escapeHtml(r.contract.pace)} · stops for you: ${escapeHtml(r.contract.asks.join(" · "))}</div>
              ${r.contract.done ? `<div class="receipt-line dim">Done (policy): ${escapeHtml(r.contract.done)}</div>` : ""}
              ${r.contract.guidance ? `<div class="receipt-line dim">▤ ${escapeHtml(r.contract.guidance)}</div>` : ""}
              ${r.contract.pins.length ? `<div class="receipt-line dim">⛭ ${escapeHtml(r.contract.pins.map(p=>"/"+p).join(", "))}</div>` : ""}</div>
            <div class="receipt-sec"><div class="receipt-tag">Decisions</div>
              <div class="receipt-line"><strong>Needed you ${r.needed.total}×</strong>${r.needed.parts.length ? " — " + escapeHtml(r.needed.parts.join(" · ")) : ""}</div>
              <div class="receipt-line"><strong>Decided itself ${r.decided.total}×</strong>${r.decided.parts.length ? " — " + escapeHtml(r.decided.parts.join(" · ")) : ""}</div>
              ${r.decided.reasons.map(x => `<div class="receipt-line dim">⚙ ${escapeHtml(x.label)} — ${escapeHtml(x.reason)}</div>`).join("")}</div>
            <div class="receipt-sec"><div class="receipt-tag">Evidence</div>
              ${r.evidence.length ? r.evidence.map(e => `<div class="receipt-line"><strong>${escapeHtml(e.node)}</strong> — ${escapeHtml(e.text)}</div>`).join("") : `<div class="receipt-line dim">—</div>`}</div>
            <div class="receipt-sec"><div class="receipt-tag">Spend</div>
              <div class="receipt-line dim">Not tracked in v1 — reserved. Where did the mission spend tokens? In the app this fills in as a projection over per-session usage, aggregated across the mission's sessions — the receipt shape is fixed now so it never migrates.</div></div>
            <div class="receipt-sec"><div class="receipt-tag">Close</div>
              ${r.closes.map(c => `<div class="receipt-line">${escapeHtml(c)}</div>`).join("")}</div>
          </div></div></div>
        </section>`;
      }
      const revealing = !!m._justDrafted;
      if (state.planCollapsed) {
        // Collapsed = a slim, glanceable status strip (click to expand) — the plan never fully disappears,
        // and this is a view preference, not a mode: checkpoints and the thread never move.
        const list = hasPlan ? missionNodeList(m) : [];
        const done = list.filter(x => x.node.status === "Completed").length;
        return `
          <aside class="panel plan-strip" data-action="toggle-plan-pane" title="Show the Mission Plan">
            <button class="chat-restore" data-action="toggle-plan-pane" aria-label="Show plan">‹</button>
            ${statusPlate(plateStateForMission(m), 'mission')}
            <span class="plan-strip-label">Mission Plan${hasPlan ? ` · ${done}/${list.length} done` : ""}</span>
          </aside>`;
      }
      return `
        <section class="panel work-panel plan-pane">
          <div class="panel-header">
            <div><div class="panel-title">Mission Plan</div><div class="panel-sub">Live</div></div>
            <span class="spacer"></span>
            ${m.status === "Completed" ? `<span class="seg"><button class="active">Plan</button><button data-action="toggle-receipt">Receipt</button></span>` : ""}
            <button class="ghost-button" data-action="toggle-plan-pane" title="Collapse the plan to a slim strip">Collapse ›</button>
          </div>
          <div class="work-body">
            <div class="work-stage">
              ${renderPlan(m)}
              ${state.inspectorOpen && state.selectedSession ? renderInspector(false) : ""}
            </div>
          </div>
          <div class="plan-revise">
            <span class="tf-plan-chip">✎ Plan</span>
            <input id="planReviseInput" class="tf-input" placeholder="${hasPlan ? 'Revise the plan — add, remove, or change a pending step… or ask to split into parallel worktrees…' : 'Approve the plan first to revise it…'}" ${hasPlan?'':'disabled'}>
            ${renderSendButton(false, hasPlan ? "revise-plan" : undefined)}
          </div>
        </section>`;
    }

    function renderAllAgentsWorkPanel(){
      const visible = boardSessions(state.boardShowArchived);   // LIVE work by default — closed missions retire their sessions into Archived
      const archN = archivedSessions().length;
      const lanes = ["Needs you","Working","Blocked","Done"];
      return `
        <section class="panel work-panel all-board">
          <div class="panel-header">
            <div><div class="panel-title">Agent Board</div><div class="panel-sub">Live work — Done means done while its mission still runs; closed missions retire their sessions</div></div>
            <span class="spacer"></span>
            ${archN ? `<button class="ghost-button" data-action="board-toggle-archived">${state.boardShowArchived ? "Hide" : "Show"} archived · ${archN}</button>` : ""}
          </div>
          <div class="work-body">
            <div class="work-stage">${renderLanes(lanes, visible, true)}</div>
            ${state.inspectorOpen ? renderInspector(true) : ""}
          </div>
        </section>`;
    }

    function renderLanes(lanes, visible, all){
      const li = Math.min(state.mobileLane || 0, lanes.length - 1);
      return `<div class="lane-tabs">${lanes.map((lane, i) => { const n = visible.filter(s => s.status === lane).length; return `<button class="lane-tab ${i === li ? "on" : ""}" data-action="pick-mobile-lane" data-i="${i}"><span class="dot" style="color:${laneColor(lane)}"></span>${lane}${n ? ` <span class="lane-tab-n">${n}</span>` : ""}</button>`; }).join("")}</div>
      <div class="board">
        ${lanes.map((lane, i) => {
          const rows = visible.filter(s => s.status === lane);
          return `<div class="lane ${i === li ? "mobile-on" : ""}">
            <div class="lane-header"><span class="dot" style="color:${laneColor(lane)}"></span>${lane}<span class="lane-count">${rows.length}</span></div>
            <div class="lane-body">${rows.length ? rows.map(s => renderWorkCard(s, all)).join("") : `<div class="empty">No sessions</div>`}</div>
          </div>`;
        }).join("")}
      </div>`;
    }

    function renderWorkCard(s, all){
      const accent = s.status==="Needs you" ? "attention" : (s.status==="Review" ? "review" : "");
      return `
        <div class="work-card ${accent} ${state.selectedSession===s.id?'active':''}" data-action="select-session" data-id="${s.id}">
          <div class="card-head">
            ${statusPlate(plateStateForSession(s), 'session', s.worktree)}
            <span class="card-title">${escapeHtml(s.title)}</span>
          </div>
          <div class="chips">
            ${all ? chip(s.owner, "owner") : ""}
            ${chip(s.workflow || "Agent", workflowClass(s.workflow))}
            ${s.reviewable ? `<span class="chip preview-chip">Preview ready</span>` : ""}
          </div>
        </div>`;
    }

    function renderPlan(m){
      if (!m || !m.workstreams || m.workstreams.length === 0) return `<div class="plan"><div class="empty">No Mission Plan yet.<br><span class="hint">Approve the mission checkpoint to draft the plan.</span></div></div>`;
      const revealing = !!m._justDrafted || !!m._justRevised;
      let body = `<div class="plan${revealing ? " revealing" : ""}">
        ${m.planOverview ? `<div class="plan-overview md"><div class="plan-overview-tag">Plan overview</div>${mdToHtml(m.planOverview)}</div>` : ""}
        ${renderEvidenceLedger(m)}
        ${m.workstreams.map(ws => renderWorkstream(ws, m)).join("")}
      </div>`;
      if (revealing) { let ri = 0; body = body.replace(/<div class="node-card/g, () => `<div style="--ri:${ri++}" class="node-card`).replace(/<div class="workstream(?=[ "])/g, () => `<div style="--wi:${Math.max(0, ri - 1)}" class="workstream`); }
      return body;
    }
    // Accumulating evidence — every completed step adds proof the whole mission (and every later agent) inherits.
    function renderEvidenceLedger(m){
      const ev = m.evidence || [];
      const total = missionNodeList(m).filter(x => !x.node.directorDirect).length;
      const shown = (state.evidenceOpen || ev.length <= 1) ? ev : ev.slice(-1);
      return `<div class="ledger">
        <div class="ledger-head"><span class="ledger-tag">Mission evidence</span><span class="spacer"></span>${ev.length > 1 ? `<button class="ghost-button xs" data-action="toggle-evidence">${state.evidenceOpen ? "Latest only" : `Show all · ${ev.length}`}</button>` : ""}<span class="ledger-count">${ev.length}${total?`/${total}`:''}</span></div>
        ${ev.length
          ? `<div class="ledger-body">${shown.map(e => `<div class="ledger-row"><span class="ev-ic">✓</span><span class="ledger-node">${escapeHtml(e.node)}</span><span class="ledger-text">${escapeHtml(e.text)}</span></div>`).join("")}</div>`
          : `<div class="ledger-empty">No evidence yet — it fills in as each step returns proof it met its bar.</div>`}
      </div>`;
    }

    function workstreamDone(ws, m){ return ws.nodes.length > 0 && ws.nodes.every(id => m.nodes[id] && m.nodes[id].status === "Completed"); }
    function workstreamIsOpen(ws, m){ const v = state.workstreamOpen[ws.id]; return v === undefined ? !workstreamDone(ws, m) : v; }

    function renderWorkstream(ws, m){
      const done = workstreamDone(ws, m);
      const open = workstreamIsOpen(ws, m);
      const doneCount = ws.nodes.filter(id => m.nodes[id] && m.nodes[id].status === "Completed").length;
      const statusEl = done
        ? `<span class="chip green">✓ ${doneCount}/${ws.nodes.length}</span>`
        : `<span class="ws-count">${doneCount}/${ws.nodes.length}</span>`;
      return `
        <div class="workstream ${done?'done':''}">
          <div class="workstream-head" data-action="toggle-workstream" data-id="${ws.id}">
            <span class="ws-chevron">${open?'▾':'▸'}</span>
            <div class="workstream-title-wrap">
              <div class="workstream-title"><span class="workstream-name">${escapeHtml(ws.title)}</span>
              <span class="workstream-chips">${chip(ws.strategy)}</span></div>
              ${open ? `<div class="workstream-purpose">${escapeHtml(ws.purpose)}</div>` : ""}
            </div>
            <span class="ws-status">${statusEl}</span>
          </div>
          ${open ? `<div class="nodes">${renderNodeGroups(ws, m)}</div>` : ""}
        </div>`;
    }
    // Group parallel siblings (same explicit `after`) into a band; flag convergence nodes (deps on 2+ branches).
    function renderNodeGroups(ws, m){
      const items = ws.nodes.map(id => ({ id, node: m.nodes[id] })).filter(x => x.node);
      const groups = [];
      items.forEach(it => {
        const sig = it.node.after ? JSON.stringify(it.node.after) : null;
        const prev = groups[groups.length - 1];
        if (sig !== null && prev && prev.sig === sig) prev.items.push(it); else groups.push({ sig, items: [it] });
      });
      return groups.map(g => {
        if (g.items.length > 1) {
          return `<div class="node-parallel"><div class="node-parallel-tag">⇉ ${g.items.length} steps run in parallel</div>${g.items.map(it => renderNodeCard(it.node, it.id, m)).join("")}</div>`;
        }
        const it = g.items[0];
        const conv = (it.node.after && it.node.after.length > 1) ? `<div class="node-converge">↳ converges ${it.node.after.length} branches</div>` : "";
        return conv + renderNodeCard(it.node, it.id, m);
      }).join("");
    }

    function renderNodeCard(node, id, m){
      if (!node) return "";
      m = m || mission(state.selectedMission);
      // (v3.25) Eligibility is part of the card's compact state — a Pending node always says WHY it isn't
      // running: waiting (on whom, with per-dep ✓/…), ready, or ready-but-held-by-the-flight-cap.
      // (App mirror: per-node deps_satisfied in compact mission_status.)
      const sched = (m && node.status === "Pending") ? nodeSchedState(m, id) : null;
      const sel = state.selectedNode===id;
      const fm = mission(state.selectedMission);   // follow-along pulse: cards render within the selected mission's plan
      const de = nodeDoneEvidence(node);
      const wt = worktreeFor(node, mission(state.selectedMission));
      // Compact by default: title/status, the chips that change what happens (workflow, gate, ✎ new), the loop strip, the bar, and the worktree label.
      // Selecting the card expands it: policy/deps/sub-tasks/binding chips, the "why" rationale, the worktree note, and the Markdown desc/detail.
      const chipsCompact = `${node.added ? chip("✎ New step","purple") : ""}${chip(node.workflow, workflowClass(node.workflow))}${node.gate ? chip("Requires approval","amber") : ""}`;
      const chipsFull = `${chipsCompact}
            ${chip(node.policy,"blue")}
            ${node.deps ? chip(`${node.deps} deps`) : ""}
            ${node.subtasks ? chip(`${node.subtasks.length} sub-tasks`,"blue") : ""}
            ${node.directorDirect ? chip("Director-direct","")
              : node.steerOf ? chip("Steers prior session","blue")
              : node.session ? chip("Bound session","green")
              : chip("Plan intent only")}`;
      return `
        <div class="node-card ${node.added?'added ':''}${sel?'active':''}${(fm && fm._followNode===id && node.status==="Running")?' following':''}" data-action="select-node" data-id="${id}">
          <div class="node-head"><strong>${escapeHtml(node.title)}</strong><span class="spacer"></span>${pill(node.status, statusClass[node.status]||"")}</div>
          <div class="chips">${sel ? chipsFull : chipsCompact}</div>
          ${sel ? `<div class="node-why">↳ ${escapeHtml(policyRationale(node))}</div>` : ""}
          <div class="node-wt">⌥ <span class="node-wt-label">${escapeHtml(wt.label)}</span>${sel && wt.note ? ` · ${escapeHtml(wt.note)}` : ''}</div>
          ${sched && sched.k === "ready" ? `<div class="node-sched ready">▸ Ready${sched.deps.length ? ` — ${escapeHtml(depsDoneLabel(m, id))}` : " — launches next"}</div>` : ""}
          ${sched && sched.k === "capped" ? `<div class="node-sched capped">▸ Ready · held by the flight cap — ${sched.inFlight}/${sched.cap} in flight</div>` : ""}
          ${sched && sched.k === "waiting" ? `<div class="node-sched wait">◇ Waiting on ${sched.deps.map(d => `<span class="dep ${d.done ? "ok" : ""}">${escapeHtml(d.title)} ${d.done ? "✓" : "…"}</span>`).join(`<span class="dep-sep">·</span>`)}</div>` : ""}
          ${node.loop ? `<div class="node-loop ${node.loop.kind==='batch'?'batch':''}">${node.loop.kind==='batch' ? `▦ verified batch · ${node.loop.trail.length} planned steps (revert red)` : `⟳ iterative · stop: ${escapeHtml(node.loop.stop)}`}</div>` : ''}
          <div class="node-dod"><span class="node-dod-k">Done when</span> ${escapeHtml(de.done)}</div>
          ${node.status==='Completed' ? `<div class="node-ev"><span class="ev-ic">✓</span> ${escapeHtml(de.evidence)}</div>` : ''}
          ${sel ? `<div class="node-desc md">${mdToHtml(node.desc)}</div>` : ""}
          ${sel && node.detail ? `<div class="node-detail md">${mdToHtml(node.detail)}</div>` : ""}
        </div>`;
    }

    function renderInspector(all){
      // (v2.5) The mission inspector is SESSION-flavored only — node detail lives in the expanding plan cards.
      const s = session(state.selectedSession) || directorSessions()[0];
      const sm = s ? missionForSession(s) : null;
      const sNode = (s && sm) ? planNodeForSession(sm, s.id) : null;
      const sWs = (sm && sNode) ? workstreamForNodeId(sm, sNode.id) : null;
      const live = s ? isLiveChild(s) : false;
      return `
        <div class="inspector">
          <button class="inspector-handle" data-action="close-inspector" aria-label="Hide inspector"></button>
          <div class="inspector-body">
            <div class="inspector-head"><div class="inspector-head-row"><span class="pill">Inspector</span>${(s && s.archived) ? `<span class="pill">Retired — evidence banked</span>` : ""}<span class="spacer"></span>${(s && !s.archived && (s.status === "Done" || s.runState === "completed")) ? `<button class="ghost-button xs" data-action="archive-session" data-id="${s.id}">Archive</button>` : ""}${s?inspectorOpenButton(s):''}</div><div class="inspector-title">${escapeHtml(s?s.title:'—')}</div></div>
            <div class="kv">
              <span>Board group</span><span>${escapeHtml(s?s.status:'—')}${s&&s.status==='Done'?' · terminal, not accepted':''}</span>
              <span>Run state</span><span>${escapeHtml(s?runStateLabel(s.runState):'—')}</span>
              <span>Owner Mission</span><span>${escapeHtml(s?(s.owner||'None'):'—')}</span>
              <span>Workstream</span><span>${sWs?escapeHtml(sWs.title):'<span class="hint">Not in plan</span>'}</span>
              <span>Plan node</span><span>${sNode?`<button class="link-button" data-action="open-plan-node" data-mission="${sm.id}" data-id="${sNode.id}">${escapeHtml(sNode.node.title)} →</button>`:'<span class="hint">No bound node</span>'}</span>
              <span>Worktree</span><span>${s?worktreeDot(s.worktree):''}<code>${escapeHtml(s?s.worktree:'—')}</code></span>
              <span>Branch</span><span><code>${escapeHtml(s?s.branch:'—')}</code></span>
            </div>
            ${s&&s.reviewable?`<div class="reply-meta">${escapeHtml(s.preview||'Preview ready')}</div>`:''}
            ${s && s.transcript && s.transcript.length ? `<div class="inspector-latest"><div class="inspector-latest-label">Latest from this session${live?' · live':''}</div><div class="inspector-latest-body">${escapeHtml(transcriptLineText(s.transcript[s.transcript.length-1]))}</div></div>` : ''}
          </div>
        </div>`;
    }

    /* ---------------- Agent surface (sessions only) ---------------- */

    function renderAgent(){
      if (state.agentSelection === "start") return renderAgentStart();
      if (state.agentSelection === "board") {
        // ONE board, two mounts: the same fleet view, session-flavored — clicking a card here OPENS the session.
        return `
        <section class="surface agent-shell">
          ${renderAgentSidebar()}
          ${renderAllAgentsWorkPanel()}
        </section>`;
      }
      const s = session(state.agentSession) || sessions[0];
      const owned = subagentsFor(s.id);
      const ownerMission = s.mission ? mission(s.mission) : null;
      return `
        <section class="surface agent-shell">
          ${renderAgentSidebar()}
          <section class="panel agent-chat">
            <div class="chat-top">
              <div class="panel-header">
                <div><div class="panel-title">${escapeHtml(s.title)}</div><div class="panel-sub">${worktreeColor(s.worktree) ? `<span style="color:${worktreeColor(s.worktree)}">⑂ ${escapeHtml(s.worktree)}</span>` : escapeHtml(s.worktree)} · ${escapeHtml(s.branch)}</div></div>
              </div>
              ${ownerMission ? `<div class="attribution-bar"><span class="dot" style="color:var(--blue)"></span><span>Delegated by Mission · <strong style="color:var(--text)">${escapeHtml(ownerMission.title)}</strong></span><span class="spacer"></span><button class="secondary-button" data-action="back-to-mission" data-id="${ownerMission.id}">Open Mission →</button></div>` : ""}
            </div>
            <div class="agent-transcript" data-chat-key="s:${s.id}">
              <div class="wf-row">${s.workflow?`<span class="chip ${workflowClass(s.workflow)}">${escapeHtml(s.workflow)}</span>`:`<span class="chip">Agent</span>`}${ownerMission?`<span class="wf-from">delegated by ${escapeHtml(ownerMission.title)}</span>`:''}</div>
              <div class="message user"><div class="message-label">You</div><div class="message-body">${escapeHtml(agentPromptFor(s))}</div></div>
              ${s.transcript.map(t => (t && typeof t === "object")

    let newSessionSeq = 1;

    function mintWorktree(text){

    function startOrchestrateSession(text){

        id, mission: null, owner: null, workflow: "Orchestrate", policy: "Agent-owned sub-agents",
        title: (text && text.length) ? (text.length > 46 ? text.slice(0,46) + "…" : text) : "Orchestrated: tidy the provider docs sweep",
        userPrompt: text || "Sweep the provider docs: fix the stale API references across pages, then verify the doc build.",
        status: "Working", runState: "running", worktree: state.execPick === "worktree" ? mintWorktree(text) : "current checkout", branch: "agent/orchestrate-demo", model: "gpt-5.5",
        transcript: ["Breaking this into sub-tasks — mapping which pages reference the old API before delegating anything."],
        tools: [], _orchPhase: 0

    }
    function orchestrateAdvance(s){
      if (!s || s.archived) return false;
      s._orchPhase = (s._orchPhase || 0) + 1;
      const wv = (s._orchWave || 1) > 1 ? "w" + s._orchWave : "";
      const kid = (suffix, title) => { sessions.push({ id: s.id + "-" + wv + suffix, parentSession: s.id, mission: null, owner: null, workflow: "Agent", policy: "Sub-agent · scoped", title, status: "Working", runState: "running", worktree: s.worktree, branch: s.branch, model: "gpt-5.5", transcript: ["Scoped charter received — working."], tools: [] }); };
      const w1 = !wv;
      if (s._orchPhase === 1) { s.transcript.push(w1 ? "Found 3 stale references across 2 pages — delegating one sub-agent per page." : "Split this pass into two scoped sub-tasks — delegating."); kid("a", w1 ? "Update references · getting-started.md" : "Sub-task A · pass " + s._orchWave); }
      else if (s._orchPhase === 2) { kid("b", w1 ? "Update references · providers.md" : "Sub-task B · pass " + s._orchWave); }
      else if (s._orchPhase === 3) { const a = session(s.id + "-" + wv + "a"); if (a) { a.status = "Done"; a.runState = "completed"; a.transcript.push(w1 ? "2 references updated; page renders clean." : "Sub-task A done — result verified."); } s.transcript.push("First sub-agent reported — checked its diff, looks right."); }
      else if (s._orchPhase === 4) { const b = session(s.id + "-" + wv + "b"); if (b) { b.status = "Done"; b.runState = "completed"; b.transcript.push(w1 ? "1 reference updated; anchors verified." : "Sub-task B done — result verified."); } }

      state.agentSelection = "session";
      state.agentSession = id;

    let newMissionSeq = 1;
    /* FOLLOW-UP SEMANTICS (v2.7): a Completed mission is IMMUTABLE — its receipt, stat, and thread are the
       accountable record of that attempt and never mutate. Typing into a completed mission's composer starts
       a FOLLOW-UP mission: a new contract, its own shape inference on the new directive, its own receipt —
       inheriting the predecessor's RECEIPT (not its transcript) as grounding context, plus its policy and
       trust settings. Curated state carries forward; the accounting unit stays per-attempt. */
    function startNewMission(followText, followFrom){
      const prev = followFrom ? mission(followFrom) : null;
      const input = followText == null ? document.getElementById("missionDraftInput") : null;
      const text = followText != null ? String(followText).trim() : (input ? input.value.trim() : "");
      if (!text) return false;
      const id = "m-new-" + (newMissionSeq++);
      const title = text.length > 44 ? text.slice(0, 44) + "…" : text;
      const issueMatch = text.match(/#\d+/);                    // ground on an issue ONLY if the directive references one
      const issueRef = issueMatch ? issueMatch[0] : null;
      // A follow-up inherits the predecessor's TRUST (policy + autonomy + pace) — earned trust carries forward.
      const autonomy = prev ? Object.assign(defaultAutonomy(), prev.autonomy || {}) : Object.assign(defaultAutonomy(), state.draftAutonomy || {});
      const planApproval = autonomy.plan === "ask";
      const pol = prev ? policyByName(prev.policyName || "Default") : policyByName(state.draftPolicy || "Default");
      // SHAPE IS INFERRED FROM THE DIRECTIVE (+ the policy's STANDING GUIDANCE, which is persistent steering —
      // it can sway the read, but the announce-with-reason -> approve pipeline is never bypassed).
      const guidance = (pol.guidance || "").trim();
      const shape = inferShapeFromDirective(text, guidanceBlock(guidance, "inference", pol.name));
      // MULTI-LAND (v3.0): merging was never the mission — irreversible-asks is PER-ACTION, and the mission
      // completes when the DONE BAR clears, however many artifacts that takes. A spec-first build can land as
      // a STACK: one PR per module, dependency order, each merge its own confirmation. Detected on the
      // directive + standing guidance; announced before drafting; steerable like the shape itself.
      const wantsStack = /\bstack(ed)?\b|separate PRs|one PR per|PR per (module|part)/i.test(text + " " + guidance);
      const landStack = wantsStack && shape.name === "Spec-First Build";
      // Policy-Done close override is announced, never silent — especially when it contradicts something the
      // directive itself named ("…and file an issue" under a report-closing policy). The policy wins unless
      // the user says otherwise before drafting (same override window as the shape).
      let closeNote = "";
      if ((pol.done || "").trim()) {
        const polTerm = terminalFromDone(pol.done);
        const bp = shapeByName(shape.name);
        const landKey = Object.keys(bp.nodes).find(k => bp.nodes[k].role === "land");
        const shapeTerm = landKey ? (bp.nodes[landKey].terminal || "pr") : "pr";
        const named = shape.namedClose;   // detected by the inference call (on the directive only) — no second regex
        if (named && named !== polTerm) {
          closeNote = ` Note: your ${pol.name} policy's definition of done closes this by ${closingAction(polTerm).short} — your directive mentions ${closingAction(named).short}; the policy wins unless you say otherwise before I draft.`;
        } else if (polTerm !== shapeTerm) {
          closeNote = ` Note: your ${pol.name} policy's definition of done closes this by ${closingAction(polTerm).short} instead of the ${shape.name}'s usual ${closingAction(shapeTerm).short} — say so before I draft if you want otherwise.`;
        }
      }
      const skills = missionSkills(text, pol);
      const skillList = skills.map(x => "/" + x).join(", ") || "the repo's conventions";
      // Grounding is open — pull whatever's relevant from available tools; a referenced issue is one source, not a requirement.
      // One GROUNDING card (v2.5) instead of a stack of skill/MCP/guidance cards — same content, one compact block.
      const issueOut = issueRef ? issueContextFor(issueRef, text) : null;
      const grounding = [
        { role: "user", text: text },
        { role: "grounding", skills: skillList,
          issue: issueRef ? { ref: issueRef, preview: (issueOut.split("\n")[0] || "").slice(0, 110) } : null,
          guidance: guidance ? { policy: pol.name, text: guidance } : null,
          follows: prev ? { id: prev.id, title: prev.title, note: `receipt inherited as context — ${(prev.evidence||[]).length} evidence rows · needed you ${(prev.userDecisions||[]).length}× / decided itself ${(prev.autoDecisions||[]).length}× · ${(prev._wrapMsg || "closed").slice(0, 80)}` } : null }
      ];
      const groundLine = (issueRef
        ? `Read ${skillList} and pulled ${issueRef} for context.`
        : `Read ${skillList}. No issue referenced — grounding on your directive and pulling repo context as I plan.`)
        + (guidance ? ` Your ${pol.name} policy's standing guidance applies — I'll fold it into the plan's bars and every delegation.` : "");
      // The shape announcement is the Director's routing decision, stated with its reason and an override invitation.
      const stackNote = landStack ? ` You asked for separate PRs — I'll land this as a stack, one PR per module in dependency order; each merge is its own confirmation, and the mission completes when the last one lands. (Want one integrated PR instead? Say so before I draft.)` : "";
      grounding.push({ role: "director", text: `${groundLine} This reads as a ${shape.name.toLowerCase()} — ${shape.reason}.${closeNote}${stackNote} No plan exists yet — approve the mission checkpoint and I'll draft it. (Not the shape you meant? Say so below before I draft.)` });
      const mObj = {
        id, pinned: false,
        title,
        subtitle: prev ? ("Follow-up of " + prev.title.slice(0, 24)) : "New mission", status: "Draft", approval: "Awaiting approval", revision: "r1",
        objective: text, autoDemo: true,
        shape: shape.name, pace: state.draftPace || "Step", checkpoint: "approval",
        policyName: pol.name, policyDone: (pol.done||"").trim(), policyPins: pol.pins || [], policyGuidance: (pol.guidance||"").trim(),
        followsFrom: prev ? prev.id : null,
        landStack,
        autonomy,
        userDecisions: [], autoDecisions: [],
        messages: grounding,
        workstreams: [],
        nodes: {}
      };
      missions.unshift(mObj);
      if (!planApproval) {
        // Plan approval on AUTO: the Director takes the decision itself — carded + logged, not silent.
        mObj.messages[mObj.messages.length-1] = { role: "director", text: `${groundLine} This reads as a ${shape.name.toLowerCase()} — ${shape.reason}.${closeNote}` };
        mObj.approval = "Approved"; mObj.status = "Running";
        draftPlanForMission(mObj);
        directorDecides(mObj, "waived plan approval", `The drafted plan matched the announced shape (${shape.name}) — starting ${mObj.pace==="Auto"?"and running straight through":"on Step, pausing at each step"}. (Plan approval set to auto by your policy.)`);
        mObj.messages.push({ role: "director", text: `Drafted the ${shape.name} plan — ${missionNodeList(mObj).map(x=>x.node.title).slice(0,3).join(", ")}, …` });
        mObj.checkpoint = "step";
      }
      state.surface = "director";
      state.directorView = "mission";
      state.newMissionDraft = false;
      state.selectedMission = id;
      state.inspectorOpen = false;
      state.checkpointOpen = false;
      state.checkpointChoice = null;
      state.selectedNode = null;
      return true;
    }

    function agentPromptFor(s){

              const name = ((d.name||"").trim()) || "Untitled policy";
              const pins = (d.skillsRaw||"").split(",").map(x => x.trim().replace(/^\//,"")).filter(Boolean);
              const budget = (d.budget||"").toString().trim();
              const pol = { id:"user-"+slug(name)+"-"+(userPolSeq++), name, user:true,
                pace:d.pace||"Step", autonomy: Object.assign(defaultAutonomy(), d.autonomy || {}),
                done:(d.done||"").trim(), guidance:(d.guidance||"").trim(), budget: budget||null, pins };
              const existing = MISSION_POLICIES.findIndex(x => x.user && x.name === pol.name);
              if (existing >= 0) MISSION_POLICIES[existing] = pol; else MISSION_POLICIES.push(pol);
              state.draftPolicy = pol.name; applyPolicyDefaults(pol);   // select + pre-load its defaults
              state.policyEditorOpen = false; state.policyDraft = null;
            }
          }
          if (a === "toggle-workstream") {
            const id = t.dataset.id;
            const m = mission(state.selectedMission);
            const ws = m && m.workstreams.find(w => w.id === id);
            const done = ws ? ws.nodes.every(nid => m.nodes[nid] && m.nodes[nid].status === "Completed") : false;
            const cur = state.workstreamOpen[id] === undefined ? !done : state.workstreamOpen[id];
            state.workstreamOpen[id] = !cur;
          }
          if (a === "close-inspector") state.inspectorOpen = false;
          if (a === "toggle-plan-pane") state.planCollapsed = !state.planCollapsed;
          if (a === "toggle-archived-missions") state.archivedMissionsOpen = !state.archivedMissionsOpen;
          if (a === "toggle-diagrams") state.diagramsOpen = !state.diagramsOpen;
          if (a === "toggle-evidence") state.evidenceOpen = !state.evidenceOpen;
          if (a === "board-toggle-archived") state.boardShowArchived = !state.boardShowArchived;
          if (a === "toggle-agent-archived") state.agentArchivedOpen = !state.agentArchivedOpen;
          if (a === "agent-open-board") { state.agentSelection = "board"; state.agentSession = null; state.mobileRailOpen = false; }
          if (a === "toggle-mobile-rail") { state.mobileRailOpen = !state.mobileRailOpen; }
          if (a === "pick-mobile-lane") { state.mobileLane = parseInt(t.dataset.i, 10) || 0; }
          if (a === "mobile-new-session") { state.agentSelection = "start"; state.agentSession = null; state.workflowPick = null; state.execPick = null; state.mobileRailOpen = false; }
          if (a === "archive-mission") {
            const am = mission(el.dataset.id || state.selectedMission);
            if (am) {
              if (am.status === "Running") {
                // Archiving live work SHELVES it: stop first (your decision, recorded), never hidden-but-running —
                // invisible running work would silently corrupt the board and the Decisions queue.
                recordDecision(am, "stopped the mission");
                am.status = "Stopped"; am.checkpoint = null; am.approval = "Stopped"; am.landPhase = null;
                am.messages.push({ role:"director", text:"Mission stopped and archived at your request — nothing further will be delegated. Unarchive any time; the thread and evidence stay intact." });
                if (state.selectedMission === am.id) clearRun();
              }
              am.archived = true;
              sessions.filter(x => x.mission === am.id).forEach(x => { x.archived = true; });
              if (state.selectedMission === am.id) { const nxt = missions.find(x => !x.example && !x.archived); state.selectedMission = nxt ? nxt.id : state.selectedMission; }
            }
          }
          if (a === "unarchive-mission") { const um = mission(el.dataset.id || state.selectedMission); if (um) { um.archived = false; sessions.filter(x => x.mission === um.id && um.status !== "Completed").forEach(x => { x.archived = false; }); } }
          if (a === "archive-session") {
            const as2 = session(el.dataset.id || state.selectedSession);
            if (as2) {
              const busy = as2.status === "Working" || as2.runState === "running";
              if (busy && as2.mission) { /* a live delegated worker belongs to its mission's plan — shelve the mission instead */ }
              else {
                if (busy) { as2.status = "Done"; as2.runState = "completed"; if (as2.transcript) as2.transcript.push("Stopped and archived at your request — transcript retained."); }
                archiveSessionCascade(as2);   // the parent takes its sub-agents with it — stopped if busy, transcripts retained
                if (state.agentSession === as2.id || subagentsFor(as2.id).some(c => c.id === state.agentSession)) { state.agentSelection = "start"; state.agentSession = null; }
              }
            }
          }
          if (a === "unarchive-session") { const us = session(el.dataset.id); if (us) unarchiveSessionCascade(us); }
          if (a === "pin-mission") { const pm = mission(el.dataset.id); if (pm) pm.pinned = !pm.pinned; }
          if (a === "toggle-receipt") { state.receiptOpen = !state.receiptOpen; if (state.receiptOpen) state.planCollapsed = false; }
          if (a === "try-policy-demo") { const tp = MISSION_POLICIES.find(p => p.id === el.dataset.id); if (tp) { state.draftPolicy = tp.name; state.draftPace = tp.pace; state.draftAutonomy = Object.assign({}, tp.autonomy); state._prefillDraft = tp.demo.directive; } }
          if (a === "copy-receipt") { const cm = mission(state.selectedMission); if (cm && typeof navigator !== "undefined" && navigator.clipboard) navigator.clipboard.writeText(missionReceiptMarkdown(cm)); }
          // (v2.5) open-work / show-chat / toggle-convo deleted with the Talk⁄Work toggle + Turn Float.
          if (a === "approve-mission") {
            const mm = mission(t.dataset.id);
            if (mm) {
              mm.approval = "Approved"; mm.status = "Running"; mm.checkpoint = "step";
              mm.messages.push({ role:"director", text: mm.id==="m-readme" ? "Approved. Launching the read-only README probe and binding the child session to the plan node." : "Approved. Locking the plan and delegating the first lane in an isolated worktree." });
              if (mm.id === "m-readme") { const sr = session("s-readme"); if (sr) { sr.status = "Working"; sr.runState = "running"; } }
            }
            state.checkpointOpen = false;
          }
          render();
        });
      });
      const startInput = document.getElementById("agentStartInput");
      if (startInput) {
        startInput.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (startAgentFromComposer()) render(); }
        });
      }
      const chatInput = document.getElementById("agentChatInput");
      if (chatInput) {
        chatInput.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (sendAgentMessage()) render(); }
        });
      }
      const draftInput = document.getElementById("missionDraftInput");
      if (draftInput) {
        draftInput.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (startNewMission()) render(); }
        });
      }
      ["missionChatInput","missionFloatInput"].forEach(idn => {
        const node = document.getElementById(idn);
        if (node) node.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (sendMissionMessage()) render(); }
        });
      });
      const planRev = document.getElementById("planReviseInput");
      if (planRev) planRev.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (sendPlanRevision()) render(); }
      });
      // Template editor: keep state synced on each keystroke WITHOUT re-rendering (so inputs keep focus).
      if (state.policyEditorOpen && state.policyDraft) {
        const d = state.policyDraft;
        const bindText = (id, set) => { const el = document.getElementById(id); if (el) el.addEventListener("input", e => set(e.target.value)); };
        bindText("tplEditName", v => d.name = v);
        bindText("tplEditSkills", v => d.skillsRaw = v);
        bindText("tplEditBudget", v => d.budget = v);
        const guid = document.getElementById("tplEditGuidance");
        if (guid) guid.addEventListener("input", e => { d.guidance = e.target.value; });
        const done = document.getElementById("tplEditDone");
        if (done) {
          done.addEventListener("input", e => { d.done = e.target.value; });
          done.addEventListener("keydown", e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); render(); } });
        }
      }
    }

    /* ============================================================
       SEEDED COMPLETED EXAMPLES — one finished mission per non-baseline
       shape, generated at BOOT by running the real drafting + runner
       machinery (draftPlanForMission + runnerTick), so the example plans
       can never drift from what the Director actually drafts. Their
       objectives deliberately carry the inference keywords, so each
       example also teaches WHY it got its shape. Example missions and
       their sessions are gated out of Decisions and the fleet Board.
       ============================================================ */
    function seedCompletedExample(cfg){
      const id = "m-ex-" + cfg.key;
      const shape = inferShapeFromDirective(cfg.objective);   // seeded through the SAME inference path — proves the keyword -> shape mapping
      const m = {
        id, pinned:false, example:true,
        title: cfg.title, subtitle: "Example · " + shape.name, status: "Running", approval: "Approved", revision: "r1",
        objective: cfg.objective, autoDemo: false,
        shape: shape.name, pace: cfg.pace || "Auto", checkpoint: "step",
        policyName: cfg.policy || "Hands-off", policyDone: "", policyPins: [],
        autonomy: Object.assign({ plan:"auto", writes:"auto", reshape:"auto", fork:"auto", childAsk:"auto" }, cfg.driveAutonomy || {}),   // drive autonomy: nothing halts during seeding (unless the narrative needs a user-resolved checkpoint)
        userDecisions: [], autoDecisions: [],
        messages: [
          { role:"user", text: cfg.objective },
          { role:"grounding", skills: (missionSkills(cfg.objective, policyByName(cfg.policy || "Hands-off")).map(x=>"/"+x).join(", ") || "the repo's conventions"), issue: null, guidance: null },
          { role:"director", text: `Read the repo context. This reads as a ${shape.name.toLowerCase()} — ${shape.reason}.` }
        ],
        workstreams: [], nodes: {}
      };
      missions.push(m);
      draftPlanForMission(m);
      // Drive it to completion synchronously (no timers): the same loop the harness uses.
      const nodesOf = () => missionNodeList(m);
      for (let i = 0; i < 400 && m.status !== "Completed"; i++) {
        if (m.landPhase === "createPR") {
          const b = [...m.messages].reverse().find(x => x.role === "bash" && x.running);
          if (b) { b.running = false; b.output = "Creating pull request…\nhttps://github.com/you/repo/pull/" + cfg.pr + "\n✓ PR #" + cfg.pr + " opened."; }
          m.prOpened = true; m.landPhase = "confirmMerge"; m.checkpoint = "merge";
          continue;
        }
        if (m.checkpoint === "merge") {
          // Seeded past the merge: the (example) user confirmed it.
          m.userDecisions.push("confirmed the merge");
          m.messages.push({ role:"director", text:"Merging PR #" + cfg.pr + " to finish up." });
          const land = nodesOf().find(x => x.node.directorDirect);
          if (land) { land.node.status = "Completed"; pushEvidence(m, land.node.title, "PR #" + cfg.pr + " squash-merged."); }
          m.landPhase = "done"; finishMission(m); break;
        }
        if (m.landPhase === "creatingIssue" || m.landPhase === "writingReport") {
          const b = [...m.messages].reverse().find(x => x.role === "bash" && x.running);
          if (b) { b.running = false; b.output = m.landPhase === "creatingIssue" ? ("✓ Issue #" + cfg.pr + " opened.") : "✓ report.md written."; }
          const land = nodesOf().find(x => x.node.directorDirect);
          if (land) { land.node.status = "Completed"; pushEvidence(m, land.node.title, m.landPhase === "creatingIssue" ? ("Issue #" + cfg.pr + " filed with the findings.") : "report.md written with the findings."); }
          m.landPhase = "done"; finishMission(m); break;
        }
        if (m.checkpoint === "pickwinner") {
          m.messages.push({ role:"user", text:"Merge Alt B — the benchmark is clearly better." });
          resolvePickWinner(m, "B", false);
          continue;
        }
        if (nodesOf().some(x => x.node.status === "Running")) { runnerTick(m); continue; }
        if (!startNextNode(m, true)) { finishMission(m); break; }
      }
      // Replace the drive's accounting with the example's NARRATIVE accounting (what the pretend user actually did),
      // and re-post the stat so the card teaches the metric. This overwrite is the one seeded fiction — labeled here.
      m.userDecisions = cfg.userDecisions.slice();
      m.autoDecisions = cfg.autoDecisions.slice();
      m._autoAdvances = cfg.autoAdvances || 0;
      const oldStat = m.messages.findIndex(x => x.role === "stat");
      if (oldStat !== -1) m.messages.splice(oldStat, 1);
      const st = decisionStat(m);
      if (st) m.messages.push({ role:"stat", total: st.total, parts: st.parts, autoTotal: st.autoTotal, autoParts: st.autoParts });
      m.pace = cfg.pace || "Auto";
      m.autonomy = cfg.autonomy || m.autonomy;
      m.checkpoint = null;
      sessions.forEach(x => { if (x.mission === m.id) x.example = true; });   // keep example sessions out of Decisions/Board
      return m;
    }
    seedCompletedExample({ key:"specfirst", pr: 128,
      title:"Redesign the sync engine (spec first)",
      objective:"redesign the sync engine across modules, spec first",
      pace:"Auto", policy:"Hands-off",
      autonomy:{ plan:"ask", writes:"auto", reshape:"auto", fork:"ask", childAsk:"auto" },
      userDecisions:["plan approval","confirmed the merge"],
      autoDecisions:["answered the implementer"], autoAdvances:5 });
    seedCompletedExample({ key:"rootcause", pr: 312,
      title:"Investigate the session teardown crash",
      objective:"investigate the crash on session teardown and file an issue",
      pace:"Auto", policy:"Hands-off",
      autonomy:{ plan:"ask", writes:"auto", reshape:"auto", fork:"ask", childAsk:"auto" },
      userDecisions:["plan approval"],
      autoDecisions:[], autoAdvances:3 });
    seedCompletedExample({ key:"bakeoff", pr: 131,
      title:"Rate limiter: cache vs index",
      objective:"rate limiter — compare cache vs index",
      driveAutonomy:{ fork:"ask" },
      pace:"Auto", policy:"Default",
      autonomy:{ plan:"ask", writes:"auto", reshape:"ask", fork:"ask", childAsk:"ask" },
      userDecisions:["plan approval","picked the winner","confirmed the merge"],
      autoDecisions:["re-steered a short bar (same session)"], autoAdvances:3 });
    seedCompletedExample({ key:"perfloop", pr: 136,
      title:"Speed up the dashboard query",
      objective:"speed up the dashboard query",
      pace:"Auto", policy:"Hands-off",
      autonomy:{ plan:"ask", writes:"ask", reshape:"auto", fork:"ask", childAsk:"auto" },
      userDecisions:["plan approval","before-edits gate","confirmed the merge"],
      autoDecisions:[], autoAdvances:4 });

    render();

    /* ===== (v3.25) Scheduler self-test — open with ?selftest=1 ===================================
       Pure helpers only (no sessions created, no demo state touched): builds the canonical DAG from
       the task-queuing review — two independent slices, #3 blocked by #1, #4 blocked by #2 AND #3 —
       and asserts eligibility, convergence gating, the idempotency guard, flight-cap holds, the
       boundary line, the rollup, and the stall detector. Mirror these cases in harness.js. */
    function runSchedulerSelfTest(){
      const t = [];
      const eq = (name, got, want) => t.push({ name, pass: JSON.stringify(got) === JSON.stringify(want), got, want });
      const ok = (name, cond) => t.push({ name, pass: !!cond, got: cond, want: true });
      const mk = () => ({ id:"selftest", status:"Running", pace:"Auto", maxConcurrent:3, checkpoint:"step", messages:[],
        workstreams:[{ id:"w", title:"t", strategy:"", purpose:"", nodes:["s1","s2","s3","s4"] }],
        nodes: {
          s1:{ title:"Slice 1", status:"Pending", workflow:"Orchestrate", after:[] },
          s2:{ title:"Slice 2", status:"Pending", workflow:"Orchestrate", after:[] },
          s3:{ title:"Slice 3", status:"Pending", workflow:"Orchestrate", after:["s1"] },
          s4:{ title:"Slice 4", status:"Pending", workflow:"Review",      after:["s2","s3"] } } });
      let m = mk();
      eq("independent slices form the initial ready set", readyPending(m).map(x=>x.id), ["s1","s2"]);
      eq("s3 waits on s1", nodeSchedState(m,"s3").k, "waiting");
      eq("s4 waits on BOTH parents", nodeSchedState(m,"s4").deps.map(d=>d.done), [false,false]);
      ok("stall detector fires (Auto · ready · nothing in flight)", eligibleNodesIdle(m));
      ok("boundary line names the REAL launch set", readySetLine(m).includes("2 ready steps in parallel") && readySetLine(m).includes("Slice 1") && readySetLine(m).includes("Slice 2"));
      m.nodes.s1.status = "Running";
      eq("a Running node leaves the ready set (idempotency guard)", readyPending(m).map(x=>x.id), ["s2"]);
      ok("stall clears while something is in flight", !eligibleNodesIdle(m));
      m.nodes.s1.status = "Completed";
      eq("completing s1 makes s3 eligible", readyPending(m).map(x=>x.id), ["s2","s3"]);
      eq("s4 still waits — one parent short", nodeSchedState(m,"s4").k, "waiting");
      m.nodes.s2.status = "Completed"; m.nodes.s3.status = "Completed";
      eq("convergence: s4 eligible only after BOTH parents", readyPending(m).map(x=>x.id), ["s4"]);
      ok("single-eligible line carries the unblock rationale", readySetLine(m).includes("now eligible") && readySetLine(m).includes("Slice 2 ✓") && readySetLine(m).includes("Slice 3 ✓"));
      m = mk(); m.maxConcurrent = 1; m.nodes.s1.status = "Running";
      eq("ready-but-capped reads as capped", nodeSchedState(m,"s2").k, "capped");
      eq("rollup counts running/ready/capped/waiting", (r => [r.running, r.ready, r.capped, r.waiting])(schedRollup(m)), [1,0,1,2]);
      m = mk(); m.pace = "Step";
      ok("Step pace is a boundary for YOU, never a stall", !eligibleNodesIdle(m));
      m = mk(); m.checkpoint = "childAsk";
      ok("a checkpoint that waits on you is not a stall", !eligibleNodesIdle(m));
      const fails = t.filter(x => !x.pass);
      console.table(t.map(x => ({ test: x.name, result: x.pass ? "✓" : "✗ got " + JSON.stringify(x.got) + " want " + JSON.stringify(x.want) })));
      const badge = document.createElement("div");
      badge.className = "selftest-badge " + (fails.length ? "fail" : "pass");
      badge.textContent = fails.length ? `scheduler selftest ✗ ${fails.length} of ${t.length} failed` : `scheduler selftest ✓ ${t.length}/${t.length}`;
      document.body.appendChild(badge);
      return fails.length === 0;
    }
    if (typeof location !== "undefined" && /[?&]selftest=1/.test(location.search)) {
      try { runSchedulerSelfTest(); }
      catch (e) { console.error("selftest crashed", e); const b = document.createElement("div"); b.className = "selftest-badge fail"; b.textContent = "scheduler selftest crashed — see console"; document.body.appendChild(b); }
    }
  </script>
</body>
