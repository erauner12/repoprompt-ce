<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RepoPrompt CE — Mission / Agent (v2 target)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #17191b;
      --panel: #202326;
      --panel-2: #24282c;
      --panel-3: #171a1d;
      --line: rgba(255,255,255,.09);
      --line-strong: rgba(255,255,255,.16);
      --text: #e8eaed;
      --muted: #a6abb3;
      --faint: #707781;
      --blue: #3f86ff;
      --green: #64d66d;
      --amber: #c7924b;
      --red: #d95f5f;
      --purple: #b86be8;
      --cyan: #40c8e0;
      --shadow: 0 20px 60px rgba(0,0,0,.38);
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #0f1113;
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    button, input, textarea { font: inherit; }
    button { color: inherit; }
    .app {
      height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 15% 0%, rgba(54,119,210,.10), transparent 28%),
        linear-gradient(180deg, #1e2225 0, #151719 58%, #111315 100%);
    }
    .traffic { display: flex; gap: 8px; flex: none; }
    .traffic span { width: 12px; height: 12px; border-radius: 50%; display: block; }
    .traffic span:nth-child(1) { background: #ff6159; }
    .traffic span:nth-child(2) { background: #ffbd2e; }
    .traffic span:nth-child(3) { background: #28c840; }
    .sidebar-chrome {
      display: flex; align-items: center; justify-content: flex-start;
      gap: 10px; min-height: 26px; padding: 0 2px 2px;
    }
    .sidebar-chrome .chrome-button { margin-left: 14px; }
    .chrome-button {
      width: 25px; height: 25px; border: 0; border-radius: 7px;
      background: transparent; color: var(--muted); display: grid;
      place-items: center; cursor: pointer; font-size: 17px; font-weight: 700;
    }
    .chrome-button:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .surface-switch {
      display: inline-flex; align-items: center; gap: 3px; padding: 4px;
      border: 1px solid var(--line-strong); border-radius: 18px;
      background: rgba(255,255,255,.04); box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);
    }
    .surface-switch button {
      border: 0; background: transparent; color: var(--muted); border-radius: 14px;
      padding: 6px 20px; min-width: 104px; cursor: pointer; font-size: 13px; font-weight: 700;
    }
    .surface-switch button.active { background: rgba(63,134,255,.25); color: #6fa4ff; }
    .surface-switch .kbd { opacity: .55; font-weight: 600; font-size: 11px; margin-left: 6px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line);
      background: rgba(255,255,255,.055); color: var(--muted); border-radius: 999px;
      padding: 5px 10px; font-size: 12px; font-weight: 700; white-space: nowrap;
    }
    .pill.blue { color: #75a8ff; background: rgba(63,134,255,.16); border-color: rgba(63,134,255,.25); }
    .pill.green { color: #8be68f; background: rgba(100,214,109,.12); border-color: rgba(100,214,109,.20); }
    .pill.amber { color: #d4a667; background: rgba(199,146,75,.13); border-color: rgba(199,146,75,.22); }
    .pill.red { color: #e07a7a; background: rgba(217,95,95,.13); border-color: rgba(217,95,95,.24); }
    .pill.purple { color: #cf92f1; background: rgba(184,107,232,.14); border-color: rgba(184,107,232,.24); }
    .pill.cyan { color: #66d6e8; background: rgba(64,200,224,.12); border-color: rgba(64,200,224,.22); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; display: inline-block; flex: none; }
    .main { height: 100%; min-height: 0; overflow: hidden; }
    .surface { height: 100%; min-height: 0; }
    .coordinator-shell {
      display: grid;
      grid-template-columns: 248px 1fr;
      gap: 10px; padding: 10px; min-height: 0; height: 100%;
    }
    .coordinator-shell.work { grid-template-columns: 248px 52px 1fr; }
    .coordinator-shell.all-board { grid-template-columns: 248px 1fr; }
    .coordinator-shell > .slim-chat { height: 100%; }
    .agent-shell {
      display: grid; grid-template-columns: 288px 1fr; gap: 10px;
      padding: 10px; min-height: 0; height: 100%;
    }
    .coordinator-shell > .conversation,
    .coordinator-shell > .work-panel,
    .agent-shell > .agent-chat { height: 100%; }
    .panel {
      background: rgba(32,35,38,.82); border: 1px solid var(--line);
      border-radius: 16px; box-shadow: var(--shadow); min-height: 0; overflow: hidden;
    }
    .sidebar { display: flex; flex-direction: column; padding: 14px; gap: 12px; }
    .section-title {
      display: flex; align-items: center; justify-content: space-between;
      color: var(--muted); font-size: 12px; font-weight: 800; letter-spacing: .01em; padding: 0 2px;
    }
    .nav-group { display: grid; gap: 6px; }
    .nav-button, .row-button {
      width: 100%; border: 1px solid transparent; border-radius: var(--radius);
      background: transparent; color: var(--muted); display: flex; align-items: center;
      gap: 10px; text-align: left; cursor: pointer; padding: 10px; min-width: 0;
    }
    .nav-button { font-weight: 700; }
    .nav-button.active, .row-button.active {
      border-color: rgba(63,134,255,.36); background: rgba(63,134,255,.18); color: var(--text);
    }
    .nav-icon {
      width: 24px; height: 24px; border-radius: 7px; background: rgba(255,255,255,.06);
      display: grid; place-items: center; font-size: 12px; color: #82aefb; flex: none;
    }
    .nav-copy, .row-copy { min-width: 0; display: block; overflow: hidden; }
    .nav-title, .row-title {
      display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 13px; line-height: 1.2;
    }
    .nav-sub, .row-sub {
      display: block; margin-top: 3px; color: var(--faint); font-size: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rows { display: flex; flex-direction: column; gap: 6px; min-height: 0; overflow: auto; flex: 1; }
    .row-button {
      padding: 9px 10px; background: rgba(255,255,255,.025);
      border-color: rgba(255,255,255,.05); display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto; align-items: center;
    }
    .row-button.child-row {
      margin-left: 22px; width: calc(100% - 22px);
      background: rgba(255,255,255,.018); position: relative;
    }
    .row-button.child-row::before {
      content: ""; position: absolute; left: -12px; top: -8px; bottom: 50%; width: 12px;
      border-left: 1px solid rgba(255,255,255,.16); border-bottom: 1px solid rgba(255,255,255,.16);
      border-bottom-left-radius: 7px;
    }
    .row-leading {
      width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center;
      color: #8fb6ff; background: rgba(63,134,255,.16); flex: none; font-size: 11px; font-weight: 800;
    }
    .row-trailing { min-width: 0; max-width: 118px; overflow: hidden; }
    .row-button.mission-row { border-color: rgba(63,134,255,.12); background: rgba(63,134,255,.055); }
    .row-button.mission-row.active { border-color: rgba(63,134,255,.45); background: rgba(63,134,255,.18); }
    .row-button.new-row { border-style: dashed; border-color: var(--line-strong); background: transparent; }
    .row-button.all-row { background: rgba(63,134,255,.07); border-color: rgba(63,134,255,.16); }
    .row-button.all-row.active { background: rgba(63,134,255,.18); border-color: rgba(63,134,255,.45); color: var(--text); }
    .row-button.archived-head { background: transparent; border-color: transparent; color: var(--muted); }
    .row-button.archived-head:hover { background: rgba(255,255,255,.03); }
    .row-button.archived-item { opacity: .72; cursor: default; }
    .rail-empty { padding: 10px 12px; font-size: 12px; color: var(--faint); line-height: 1.5; }
    .rail-empty strong { color: var(--muted); }
    .mission-pin { color: var(--faint); font-size: 11px; margin-left: 5px; }
    .plate { position: relative; width: 22px; height: 22px; flex: none; display: grid; place-items: center; }
    .plate-fill { position: absolute; inset: 0; border-radius: 50%; background: rgba(255,255,255,.07); }
    .plate-glyph { position: relative; width: 12px; height: 12px; color: var(--faint); display: grid; place-items: center; }
    .plate-glyph svg { width: 12px; height: 12px; display: block; }
    .plate-ring { position: absolute; inset: -2px; border-radius: 50%; pointer-events: none; }
    .plate-ring.running { border: 1.5px solid transparent; border-top-color: var(--blue); animation: plate-spin .9s linear infinite; }
    .plate-ring.attention { box-shadow: 0 0 0 1.5px rgba(199,146,75,.55); }
    .plate-ring.review { box-shadow: 0 0 0 1.5px rgba(184,107,232,.55); }
    @keyframes plate-spin { to { transform: rotate(360deg); } }
    .plate-running .plate-fill { background: rgba(63,134,255,.20); } .plate-running .plate-glyph { color: #8fb6ff; }
    .plate-attention .plate-fill { background: rgba(199,146,75,.20); } .plate-attention .plate-glyph { color: #d4a667; }
    .plate-done .plate-fill { background: rgba(100,214,109,.18); } .plate-done .plate-glyph { color: #8be68f; }
    .plate-failed .plate-fill { background: rgba(217,95,95,.20); } .plate-failed .plate-glyph { color: #e07a7a; }
    .plate-review .plate-fill { background: rgba(184,107,232,.18); } .plate-review .plate-glyph { color: #cf92f1; }
    .plate-idle .plate-fill { background: rgba(255,255,255,.07); } .plate-idle .plate-glyph { color: var(--faint); }
    .plate-accent .plate-fill { background: rgba(63,134,255,.18); } .plate-accent .plate-glyph { color: #8fb6ff; }
    .plate-wt { position: absolute; right: -1px; bottom: -1px; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #1c1f22; }
    .wt-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex: none; vertical-align: middle; margin-right: 5px; border: 1px solid rgba(0,0,0,.28); }
    .card-head { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .card-head .card-title { flex: 1; min-width: 0; }
    .work-card.attention { box-shadow: inset 2px 0 0 rgba(199,146,75,.75); }
    .work-card.review { box-shadow: inset 2px 0 0 rgba(184,107,232,.7); }
    .chip.preview-chip { color: #cf92f1; background: rgba(184,107,232,.14); border-color: rgba(184,107,232,.3); }
    .inspector-reply { margin-top: 12px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--line-strong); border-radius: 10px; background: rgba(15,17,19,.6); padding: 6px 8px; }
    .inspector-reply input { flex: 1; min-width: 0; background: transparent; border: 0; outline: 0; color: var(--text); font-size: 12px; }
    .inspector-reply .send { width: 26px; height: 26px; font-size: 14px; }
    .reply-meta { margin-top: 10px; font-size: 11px; color: var(--faint); }
    .inspector-latest { margin-top: 12px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.025); padding: 8px 10px; }
    .inspector-latest-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); font-weight: 800; margin-bottom: 4px; }
    .inspector-latest-body { font-size: 12px; color: var(--muted); line-height: 1.42; }
    .cp-marker { display: flex; align-items: center; gap: 9px; margin: 3px 0; padding: 6px 10px; border: 1px dashed var(--line); border-radius: 9px; background: rgba(255,255,255,.02); }
    .cp-marker.auto { border-color: rgba(63,134,255,.32); }
    .cp-marker.manual { border-color: rgba(74,179,108,.32); }
    .cp-marker.refine { border-color: rgba(167,139,250,.36); }
    .cp-marker.refine .cp-marker-ic { color: #c4b5fd; background: rgba(167,139,250,.18); }
    .cp-marker.revise { border-color: rgba(199,146,75,.4); }
    .cp-marker.revise .cp-marker-ic { color: var(--amber); background: rgba(199,146,75,.16); }
    .tf-plan-chip { flex: none; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: #c4b5fd; background: rgba(167,139,250,.16); border-radius: 6px; padding: 4px 7px; white-space: nowrap; }
    .cp-marker-ic { flex: none; width: 19px; height: 19px; display: grid; place-items: center; border-radius: 50%; font-size: 12px; font-weight: 900; }
    .cp-marker.auto .cp-marker-ic { color: #8fb6ff; background: rgba(63,134,255,.16); }
    .cp-marker.manual .cp-marker-ic { color: var(--green); background: rgba(74,179,108,.16); }
    .cp-marker-body { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .cp-marker-title { font-size: 12px; color: var(--text); font-weight: 700; }
    .cp-marker-tag { font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: .05em; font-weight: 800; }
    .sidebar-footer {
      margin-top: auto; border-top: 1px solid var(--line); padding-top: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .workspace-card { display: grid; gap: 8px; color: var(--muted); font-size: 12px; }
    .workspace-heading { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .workspace-switch {
      margin-left: auto; max-width: 150px; border: 1px solid var(--line);
      background: rgba(255,255,255,.045); color: var(--text); border-radius: 999px;
      padding: 5px 9px; font-size: 12px; font-weight: 800;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .repo-list { display: grid; gap: 6px; }
    .repo-row {
      display: grid; grid-template-columns: auto minmax(0, 1fr); align-items: center;
      gap: 8px; border-radius: 8px; padding: 6px 8px; background: rgba(255,255,255,.026);
    }
    .repo-name { display: block; color: var(--text); font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .repo-branch { display: block; color: var(--faint); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conversation { display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto; min-height: 0; }
    .panel-header {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      min-height: 56px; flex: none; flex-wrap: nowrap;
      border-bottom: 1px solid rgba(255,255,255,.055); min-width: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .bar-btn { border: 1px solid var(--line); background: rgba(255,255,255,.045); color: var(--muted); border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 800; cursor: pointer; white-space: nowrap; }
    .bar-btn:hover { background: rgba(255,255,255,.09); color: var(--text); }
    .topright-stack { position: fixed; top: 14px; right: 18px; z-index: 50; display: flex; align-items: center; gap: 10px; }
    .topright-nav { display: flex; align-items: center; gap: 8px; padding: 5px; border-radius: 20px; background: rgba(18,20,23,.55); backdrop-filter: blur(20px) saturate(1.2); box-shadow: 0 8px 26px rgba(0,0,0,.34); }
    .chat-float { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line-strong); background: rgba(18,20,23,.62); backdrop-filter: blur(20px) saturate(1.2); color: var(--text); border-radius: 16px; padding: 9px 14px; font-size: 12px; font-weight: 800; cursor: pointer; box-shadow: 0 8px 26px rgba(0,0,0,.34); }
    .chat-float:hover { background: rgba(30,33,37,.85); }
    .decisions-panel { display: grid; grid-template-rows: auto minmax(0,1fr); }
    .decisions-body { overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .decision-card { position: relative; overflow: hidden; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.026); padding: 13px 14px 13px 18px; cursor: pointer; }
    .decision-card:hover { background: rgba(255,255,255,.045); border-color: var(--line-strong); }
    .decision-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .decision-main { min-width: 0; }
    .decision-head { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .decision-kind { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 999px; flex: none; }
    .decision-kind.amber { color: #d4a667; background: rgba(199,146,75,.14); }
    .decision-kind.purple { color: #cf92f1; background: rgba(184,107,232,.14); }
    .decision-kind.red { color: #e07a7a; background: rgba(217,95,95,.14); }
    .decision-title { font-size: 13px; font-weight: 800; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .decision-ctx { color: var(--muted); font-size: 12px; margin-top: 5px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .decision-meta { color: var(--faint); font-size: 11px; margin-top: 5px; }
    .decision-go { color: var(--muted); font-size: 18px; font-weight: 900; }
    .dec-chip { border: 1px solid rgba(199,146,75,.3); background: rgba(199,146,75,.12); color: #d4a667; border-radius: 999px; padding: 3px 9px; font-size: 11px; font-weight: 800; cursor: pointer; }
    .dec-chip:hover { background: rgba(199,146,75,.2); }
    .chat-top { display: flex; flex-direction: column; min-height: 0; }
    .header-controls { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .panel-title { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .panel-sub { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .spacer { flex: 1; }
    .link-button { border: 0; background: transparent; color: #70a7ff; cursor: pointer; font-size: 12px; font-weight: 700; }
    .scroll { min-height: 0; overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    /* chat children must size to their content — never let the flex column compress a card (esp. bash/mcp with overflowing <pre>) into a sliver as the thread grows */
    .scroll > *, .agent-transcript > *, .turn-float-scroll > * { flex: 0 0 auto; }
    .conversation-footer { display: flex; flex-direction: column; border-top: 1px solid var(--line); }
    .mission-card, .message, .checkpoint, .delegated-card, .node-card, .inspector-card {
      border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.035);
    }
    .message { padding: 11px 12px; background: rgba(255,255,255,.026); }
    .message.user { align-self: flex-end; max-width: 78%; background: rgba(63,134,255,.18); border-color: rgba(63,134,255,.22); }
    .message-label { display: flex; gap: 8px; color: #6ea4ff; font-size: 12px; font-weight: 800; margin-bottom: 5px; }
    .message.user .message-label { color: var(--muted); }
    .message-body { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .message.steer { background: rgba(63,134,255,.12); border-left: 2px solid var(--blue); }
    .message.steer .message-label { color: #8fb6ff; }
    .bash-card { border: 1px solid var(--line); border-radius: 10px; background: rgba(0,0,0,.34); overflow: hidden; }
    .bash-head { display: flex; align-items: center; gap: 8px; padding: 8px 11px; font-family: var(--mono); font-size: 12px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.03); }
    .bash-ico { color: #8be68f; font-weight: 900; flex: none; }
    .bash-cmd { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .bash-run { flex: none; color: var(--amber); font-size: 11px; font-weight: 800; }
    .bash-done { flex: none; color: var(--green); font-size: 11px; font-weight: 800; }
    .bash-out { margin: 0; padding: 10px 12px; font-family: var(--mono); font-size: 11.5px; line-height: 1.5; color: var(--muted); max-height: 168px; overflow: auto; white-space: pre-wrap; }
    .bash-out.bash-pending { color: var(--faint); }
    .ctx-marker { display: flex; align-items: center; gap: 9px; padding: 7px 11px; border: 1px dashed var(--line); border-radius: 9px; background: rgba(255,255,255,.02); }
    .ctx-pill { flex: none; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; border-radius: 6px; padding: 3px 7px; }
    .ctx-pill.skill { color: #d3a4f2; background: rgba(184,107,232,.14); border: 1px solid rgba(184,107,232,.30); }
    .ctx-pill.probe { color: #40c8e0; background: rgba(64,200,224,.12); border: 1px solid rgba(64,200,224,.30); }
    .ctx-text { font-size: 12px; color: var(--muted); }
    .ctx-text strong { color: var(--text); font-weight: 700; }
    .mcp-tag { flex: none; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: #6fd9ea; background: rgba(64,200,224,.13); border: 1px solid rgba(64,200,224,.28); border-radius: 6px; padding: 3px 7px; }
    .delegated-card {
      padding: 10px 12px; display: grid; grid-template-columns: auto 1fr auto; gap: 10px;
      align-items: center; cursor: default; border-color: rgba(63,134,255,.18);
    }
    .delegated-card.active { background: rgba(63,134,255,.16); border-color: rgba(63,134,255,.55); }
    .delegated-card.flash { animation: card-flash 1.4s ease 1; }

    // The closing action is described in plain language ("Definition of done"); the Director infers the concrete terminal.
    function terminalFromDone(s){
      const t = (s || "").toLowerCase();

      if (/report|write[- ]?up|memo|\.md\b|findings (doc|document)|summary doc/.test(t)) return "report";

    function defaultDoneForTerminal(term){
      return term === "issue" ? "File a GitHub issue with the root cause and a recommended fix. No code changes."

    function terminalExplain(term){

    function inferSkillsFromBrief(brief){

      if (/spec|architect|design|proposal|rfc/.test(t)) out.push("architecture", "spec-writing");
      if (/investigat|root[- ]?cause|repro|bug|crash|regress|debug/.test(t)) out.push("root-cause");
      if (/perf|latency|slow|profil|optimi/.test(t)) out.push("profiling");

    // Effective skills for a mission = stored (built-in curated, or a saved union), else inferred-from-brief ∪ pinned.
    function effectiveSkills(tpl){

    // The closing is just the plan's last action (drawn from available tools) — not an official "type".
    // What matters for a checkpoint is whether the action is reversible, not which of three buckets it is.
    function closingAction(term){

      if (term === "report") return { verb:"write report.md", short:"write a report", artifact:"report.md", irreversible:false };

    // Why a step runs the way it does — derived from what it DOES (reads/writes, reversible, fresh vs continuation),
    // so the policy reads as reasoning, not a fixed role label.
    function policyRationale(node){
      if (!node) return "";
      if (node.compareChoice) return "decision point · both alternatives met the same bar — you pick, the loser's worktree is discarded";
      if (node.integrate) return "convergence · merges the parallel module branches into one and runs the cross-boundary suite (integrate all, not pick one)";
      if (node.coordinatorDirect) { const c = closingAction(node.terminal || "pr"); return c.irreversible ? `closing action · ${c.gate} is irreversible, so I confirm with you first` : `closing action · low-risk, handled directly — no session`; }
      if (node.altWorktree) return "competing alternative · its own isolated worktree (a 2nd worktree earns its cost), one writer";
      if (node.partWorktree) return "independent module · its own worktree so it can build in parallel — justified because the spec proved no shared files";
      if (node.steerOf) return "continues the same change · reuse the worktree & session, no fresh spin-up";
      if (node.mutableBoundary) return "writes code · isolated worktree keeps it reversible until you land";
      if (node.workflow === "Review") return "needs independent eyes · a fresh read-only session, separate from the author";
      if (node.readonly || node.workflow === "Explore" || node.workflow === "Investigate") return "read-only discovery · nothing to undo, safe to run freely";
      return "delegated step";
    }
    // The worktree decision is inferred per node (isolation costs disk + merge overhead — a second one must earn it), and shown/explained.
    function worktreeFor(node, m){
      const wt = "wt/" + slug((m && (m.objective || m.id)) || "task").slice(0, 18);
      if (!node) return { label: wt, note: "" };
      if (node.compareChoice) return { label: "—", note: "decision · discards the losing worktree" };
      if (node.integrate) return { label: wt + "-integrate", note: "integration branch · merges the parallel modules" };
      if (node.coordinatorDirect) return { label: "—", note: "preview → merge · no worktree" };
      if (node.altWorktree) return { label: node.altWorktree, note: "isolated alt worktree · one writer (bake-off)" };
      if (node.partWorktree) return { label: node.partWorktree, note: "independent module · own worktree, one writer (parallel — earns its cost)" };
      if (node.mutableBoundary) return { label: wt, note: "isolated worktree · one writer" };
      if (node.steerOf) return { label: wt, note: "same worktree · reused (steer, not spawn)" };
      if (node.workflow === "Review") return { label: wt, note: "same worktree · read-only diff" };
      return { label: "read-only", note: "no worktree needed · bound read-only" };
    }
    // A step is "done" only when it returns evidence meeting its acceptance criterion — not because a workflow ran.
    // Authored done/evidence win; otherwise derive a sensible bar from what the step does.
    function nodeDoneEvidence(node){
      if (!node) return { done:"", evidence:"" };
      let dDone, dEv;
      if (node.compareChoice) { dDone = "the stronger alternative is chosen against the shared bar"; dEv = "Compared both alternatives on the same criteria; winner picked."; }
      else if (node.coordinatorDirect) { const c = closingAction(node.terminal || "pr"); dDone = `the mission's definition of done is met and the close is complete`; dEv = `Closed by ${c.verb}.`; }
      else if (node.steerOf) { dDone = "focused tests cover the change and pass"; dEv = "Focused suite green in the same worktree; branch pushed."; }
      else if (node.mutableBoundary) { dDone = "the change is implemented and self-contained in the worktree"; dEv = "Implemented in an isolated worktree; diff scoped; build passes."; }
      else if (node.workflow === "Review") { dDone = "an independent read finds no blocking issues"; dEv = "Independent review returned recommendations; no blockers; read-only."; }
      else if (node.workflow === "Deep Plan") { dDone = "the spec covers interfaces, data model, and trade-offs"; dEv = "spec.md drafted; awaiting sign-off."; }

    function escapeHtml(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }

    /* ---- Tiny Markdown renderer for plan descriptions (so the proposing agent can include structure + diagrams).

    function mdInline(t){
      return escapeHtml(t)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|[^*])\*([^*\n]+?)\*/g, '$1<em>$2</em>')

    let mermaidSeq = 1;
    function mdToHtml(src){
      if (!src) return "";

      let html = "", i = 0, inUL = false, inOL = false;
      const closeLists = () => { if (inUL){ html+="</ul>"; inUL=false; } if (inOL){ html+="</ol>"; inOL=false; } };
      while (i < lines.length) {
        const line = lines[i];
        if (/^```/.test(line)) {
          const lang = line.slice(3).trim(); const code = []; i++;
          while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
          i++; closeLists();
          if (lang === "mermaid") html += `<div class="mermaid" id="mmd-${mermaidSeq++}">${escapeHtml(code.join("\n"))}</div>`;
          else html += `<pre class="md-pre"><code>${escapeHtml(code.join("\n"))}</code></pre>`;

        const h = line.match(/^(#{1,4})\s+(.*)$/);
        if (h) { closeLists(); const lv = h[1].length; html += `<div class="md-h md-h${lv}">${mdInline(h[2])}</div>`; i++; continue; }

    function chip(text, cls=""){ return text ? `<span class="chip ${cls}">${escapeHtml(text)}</span>` : ""; }

    const WT_PALETTE = ["#4f8cff","#40c8e0","#b86be8","#64d66d","#e0a35e","#e0708a"];

      const ordered = [...live.filter(m => m.pinned), ...live.filter(m => !m.pinned)];
      const decCount = decisions().length;
      return `
        <aside class="panel sidebar">
          <div class="sidebar-chrome">
            <div class="traffic" aria-hidden="true"><span></span><span></span><span></span></div>
            <button class="chrome-button" data-action="new-mission" title="New Mission">+</button>
          </div>
          <input class="search" placeholder="Search missions">
          <div class="rows">
            <button class="row-button dec-nav ${state.coordView==='decisions'?'active':''}" data-action="coord-view-decisions">
              ${statusPlate('attention', 'checklist')}
              <span class="row-copy"><span class="row-title">Decisions</span><span class="row-sub">What needs you across missions</span></span>
              <span class="row-trailing">${pill(String(decCount), decCount?'amber':'')}</span>
            </button>
            <button class="row-button all-row ${state.coordView==='all'?'active':''}" data-action="coord-view-all">
              ${statusPlate('accent', 'board')}
              <span class="row-copy"><span class="row-title">All Agents Board</span><span class="row-sub">Every agent run — delegated + standalone</span></span>
              <span class="row-trailing">${pill(String(boardSessions().length))}</span>
            </button>
            <div class="section-title" style="margin-top:8px"><span>Missions</span><span>${live.length}</span></div>
            ${ordered.map(renderMissionRow).join("")}
            ${renderExamplesSection()}
          </div>
          <div class="sidebar-footer">
            <div class="workspace-card">
              <div class="workspace-heading"><span>Workspace</span><button class="workspace-switch">runtime-demo</button></div>
              <div class="repo-list">
                <div class="repo-row"><span class="row-leading">R</span><span><span class="repo-name">repoprompt-ce</span><span class="repo-branch">director/runtime-demo</span></span></div>
              </div>
            </div>
          </div>
        </aside>`;
    }

    function renderMissionRow(item){
      const isActive = !state.newMissionDraft && state.coordView==='mission' && item.id===state.selectedMission;
      return `
        <button class="row-button mission-row ${isActive?'active':''}" data-action="select-mission" data-id="${item.id}">
          ${statusPlate(plateStateForMission(item), 'mission')}
          <span class="row-copy"><span class="row-title">${escapeHtml(item.title)}${item.pinned?'<span class="mission-pin">★</span>':''}</span><span class="row-sub">${escapeHtml(item.subtitle)} · ${escapeHtml(item.revision)}</span></span>
          <span class="row-trailing">${pill(item.status, statusClass[item.status]||"")}</span>
        </button>`;
    }

    function renderExamplesSection(){
      const examples = missions.filter(m => m.example);
      const open = state.archivedMissionsOpen;
      return `
        <button class="row-button archived-head" data-action="toggle-archived">
          <span class="row-leading">${open?'▾':'▸'}</span>
          <span class="row-copy"><span class="row-title">Examples</span><span class="row-sub">Sample missions to open during the demo</span></span>
          <span class="row-trailing">${pill(String(examples.length + archivedMissions.length))}</span>
        </button>
        ${open ? examples.map(renderMissionRow).join("") + archivedMissions.map(a => `
          <button class="row-button archived-item" title="Archived (illustrative)">
            <span class="row-leading">A</span>
            <span class="row-copy"><span class="row-title">${escapeHtml(a.title)}</span><span class="row-sub">${escapeHtml(a.subtitle)} · ${escapeHtml(a.revision)}</span></span>
            <span class="row-trailing">${pill(a.status, statusClass[a.status]||"")}</span>
          </button>`).join("") : ""}`;
    }

    function renderMissionConversation(m){
      if (!m && state.templateEditorOpen) return renderTemplateEditor();
      if (!m) {
        return `
          <section class="panel conversation">
            <div class="panel-header">
              <div><div class="panel-title">New Mission</div><div class="panel-sub">Draft a new Mission</div></div>
              <span class="spacer"></span>
            </div>
            <div class="mission-status-strip"><div class="mission-status-copy">No plan yet — a plan will be drafted after your first directive.</div></div>
            <div class="scroll agent-start-wrap">
              <div class="agent-start">
                <div class="agent-start-hero">
                  <svg class="ash-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h11a3 3 0 0 1 3 3v3a3 3 0 0 1-3 3H9l-4 3v-3H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>
                  <span class="agent-start-title">What are we building?</span>
                </div>
                <div class="agent-start-block">
                  <div class="asb-head"><span class="asb-label">Mission Templates</span><span class="spacer"></span></div>
                  <div class="tpl-sub">Pick how the Director should run this mission. A template is a short <strong>brief</strong> plus a few <strong>defaults</strong> (autonomy, checkpoints, how it ends) — the Director drafts the plan from the brief each run. Then describe the mission below to start.</div>
                  <div class="tpl-list">${renderTemplateCards()}</div>
                  <div class="tpl-foot"><button class="ghost-button" data-action="open-template-editor">＋ New Template</button><span class="spacer"></span><button class="ghost-button" data-action="noop">Open Folder</button></div>
                </div>
              </div>
            </div>
            <div class="conversation-footer">${renderCoordinatorComposer(null)}</div>
          </section>`;
      }
      const linked = missionSessionsInOrder(m);
      const anyRunning = (m.workstreams && m.workstreams.length) ? missionNodeList(m).some(x => x.node.status==="Running") : false;
      const showCheckpoint = (m.checkpoint==="approval") || (m.checkpoint==="merge") || (m.checkpoint==="pickwinner") || (m.checkpoint==="step" && !anyRunning && (m.pace==="Step" || missionAtGate(m)));
      return `
        <section class="panel conversation">
          <div class="panel-header">
            <div><div class="panel-title">${escapeHtml(m.title)}</div><div class="panel-sub">Mission</div></div>
            <span class="spacer"></span>
          </div>
          ${renderMissionStatusStrip(m)}
          <div class="scroll" data-chat-key="m:${m.id}">
            ${m.messages.map(renderMessage).join("")}
            ${(() => { const inMsg = new Set(m.messages.filter(x=>x.role==='session').map(x=>x.id)); const rem = linked.filter(s=>!inMsg.has(s.id)); return rem.length ? `<div class="hint" style="margin-top:2px">Delegated sessions</div>` + rem.map(renderDelegatedCard).join("") : ""; })()}
            ${showCheckpoint ? renderCheckpoint(m) : ""}
          </div>
          <div class="conversation-footer">
            ${renderCoordinatorComposer(m)}
          </div>
        </section>`;
    }

    function renderMissionStatusStrip(m){
      const nodes = missionNodeList(m);
      const done = nodes.filter(x => x.node.status==="Completed").length;
      const cur = currentMissionNode(m);
      const decCount = decisions().filter(d => d.missionId === m.id).length;
      return `
        <div class="mission-status-strip">
          <div class="mission-status-head">
            <div style="min-width:0">
              <div class="mission-status-title">
                <span>Mission Plan</span>
                ${pill(m.status, statusClass[m.status]||"")}
                ${(m.autoDemo && m.pace==="Auto" && m.status==="Running" && !missionAtGate(m)) ? pill("Auto-running…","blue") : ""}
                ${missionAtGate(m) ? pill("Paused · needs you","amber") : ""}
                ${nodes.length ? pill(`${done}/${nodes.length} done`, done===nodes.length?"green":"blue") : (m.gathering ? pill("Gathering evidence…","blue") : pill("Not drafted",""))}
                ${decCount>0 ? `<button class="dec-chip" data-action="coord-view-decisions">${decCount} decision${decCount>1?'s':''} →</button>` : ""}
              </div>
              <div class="mission-status-copy">${nodes.length ? `Current: ${escapeHtml(cur ? cur.title : "—")}` : (m.gathering ? "Running read-only probes before drafting the plan." : "Plan will be drafted at the first checkpoint.")}</div>
            </div>
            <button class="secondary-button" data-action="open-work">Open Plan →</button>
          </div>
        </div>`;
    }

    function decisions(){
      const out = [];
      missions.filter(m => !m.example).forEach(m => {
        if (m.approval === "Awaiting approval") {
          out.push({ id:"appr-"+m.id, kind:"Approve", title:"Approve the Mission plan", color:"amber", urgency:3, missionId:m.id, missionTitle:m.title, sessionId:null, context:"Plan is held for your approval before any work starts." });
        } else if (m.checkpoint === "merge") {
          out.push({ id:"merge-"+m.id, kind:"Merge", title:"Review & merge the PR", color:"amber", urgency:4, missionId:m.id, missionTitle:m.title, sessionId:null, context:"PR #142 is open for review — merge to finish, or paste PR feedback into the composer for another pass." });
        } else if (m.checkpoint === "step" && missionAtGate(m)) {
          out.push({ id:"gate-"+m.id, kind:"Approve", title:"Approve before edits", color:"amber", urgency:3, missionId:m.id, missionTitle:m.title, sessionId:null, context:"Paused before the first mutable write — approve to start the edits in the worktree." });
        }
      });
      coordinatorSessions().filter(s => !s.example).forEach(s => {
        if (s.reviewable || s.status==="Review") {
          out.push({ id:"rev-"+s.id, kind:"Review", title:"Review changes", color:"purple", urgency:3, missionId:s.mission, missionTitle:s.owner, sessionId:s.id, context:(s.preview||"Completed work is ready for review.") });
        } else if (s.status==="Blocked") {
          out.push({ id:"blk-"+s.id, kind:"Blocked", title:"Resolve the blocker", color:"red", urgency:4, missionId:s.mission, missionTitle:s.owner, sessionId:s.id, context:(s.transcript&&s.transcript[0])||"A delegated lane is blocked and needs a call." });
        } else if (s.status==="Needs you") {
          const ask = s.runState==="waitingForQuestion";
          out.push({ id:"need-"+s.id, kind: ask?"Answer":"Approve", title: ask?"Answer a question":"Approve to continue", color:"amber", urgency:2, missionId:s.mission, missionTitle:s.owner, sessionId:s.id, context:(s.transcript&&s.transcript[0])||"A session is waiting on you." });
        }
      });
      return out.sort((a,b) => b.urgency - a.urgency);
    }
    function decisionColor(c){ return c==="red" ? "var(--red)" : c==="purple" ? "var(--purple)" : "var(--amber)"; }

    function renderDecisionsPanel(){
      const list = decisions();
      return `
        <section class="panel work-panel decisions-panel">
          <div class="panel-header">
            <div><div class="panel-title">Decisions</div><div class="panel-sub">${list.length ? `${list.length} waiting across your missions` : "Nothing needs you right now"}</div></div>
            <span class="spacer"></span>
          </div>
          <div class="decisions-body">
            ${list.length ? list.map(renderDecisionCard).join("") : `<div class="empty">All clear — no decisions are waiting.</div>`}
          </div>
        </section>`;
    }
    function renderDecisionCard(d){
      const sess = d.sessionId ? session(d.sessionId) : null;
      return `
        <div class="decision-card" data-action="open-decision" data-mission="${d.missionId}" data-session="${d.sessionId||''}">
          <span class="decision-accent" style="background:${decisionColor(d.color)}"></span>
          <div class="decision-main">
            <div class="decision-head"><span class="decision-kind ${d.color}">${escapeHtml(d.kind)}</span><span class="decision-title">${escapeHtml(d.title)}</span></div>
            <div class="decision-ctx">${escapeHtml(d.context)}</div>
            <div class="decision-meta">${escapeHtml(d.missionTitle)}${sess?` · ${escapeHtml(sess.title)}`:""}</div>
          </div>
          <span class="decision-go">›</span>
        </div>`;
    }

    function renderMessage(msg){
      if (msg.role === "session") {
        const s = session(msg.id);
        return s ? renderDelegatedCard(s) : "";
      }
      if (msg.role === "skill") {
        return `<div class="ctx-marker"><span class="ctx-pill skill">Skill</span><span class="ctx-text">Reading <strong>${escapeHtml(msg.title)}</strong>${msg.note?` — ${escapeHtml(msg.note)}`:''}</span></div>`;
      }
      if (msg.role === "probe") {
        return `<div class="ctx-marker"><span class="ctx-pill probe">Probe</span><span class="ctx-text">Read-only scan of <strong>${escapeHtml(msg.areas)}</strong> — scoping context before the plan</span></div>`;
      }
      if (msg.role === "mcp") {
        return `<div class="bash-card">
          <div class="bash-head"><span class="mcp-tag">MCP</span><span class="bash-cmd">${escapeHtml(msg.server)} · ${escapeHtml(msg.tool)}(${escapeHtml(msg.arg||"")})</span>${msg.running?'<span class="bash-run">resolving…</span>':'<span class="bash-done">resolved</span>'}</div>
          ${msg.output ? `<pre class="bash-out">${escapeHtml(msg.output)}</pre>` : ''}
        </div>`;
      }
      if (msg.role === "bash") {
        return `<div class="bash-card">
          <div class="bash-head"><span class="bash-ico">›_</span><span class="bash-cmd">${escapeHtml(msg.cmd)}</span>${msg.running?'<span class="bash-run">running…</span>':'<span class="bash-done">done</span>'}</div>
          ${msg.output ? `<pre class="bash-out">${escapeHtml(msg.output)}</pre>` : (msg.running ? `<pre class="bash-out bash-pending">…</pre>` : '')}
        </div>`;
      }
      if (msg.role === "parallel") {
        return `<div class="par-card"><div class="par-head"><span class="par-ic">⇉</span> ${msg.round?`Building in parallel <span class="par-round">round ${msg.round}</span>`:`Parallel threads · each supervised to its bar`}</div>${msg.items.map(it => `<div class="par-row"><span class="par-dot"></span><span class="par-name">${escapeHtml(it.title)}</span><span class="spacer"></span><span class="par-note">${escapeHtml(it.note)}</span></div>`).join("")}</div>`;
      }
      if (msg.role === "psteer") {
        return `<div class="psteer ${msg.last?'met':''}"><span class="psteer-ic">↻</span><span class="psteer-name">${escapeHtml(msg.node)}</span><span class="psteer-wt">${escapeHtml(msg.worktree)}</span><span class="spacer"></span><span class="psteer-note">${escapeHtml(msg.note)}</span>${msg.last?'<span class="psteer-met">meets bar ✓</span>':`<span class="psteer-beat">re-steer ${msg.beat}</span>`}</div>`;
      }
      if (msg.role === "loopiter") {
        const batch = msg.kind === "batch";
        const probe = msg.kind === "probe";
        const ic = batch ? "▦" : probe ? "🔍" : "⟳";
        const tail = msg.last ? `<span class="loopiter-stop">${batch ? "behavior preserved" : probe ? "context adequate" : ("stop: " + escapeHtml(msg.stop))}</span>` : "";
        return `<div class="loopiter ${msg.last?'last':''} ${batch?'batch':''} ${probe?'probe':''}"><span class="loopiter-ic">${ic}</span><span class="loopiter-n">${(msg.i||0)+1}</span><span class="loopiter-label">${escapeHtml(msg.label)}</span><span class="spacer"></span><span class="loopiter-val">${escapeHtml(msg.note)}</span>${tail}</div>`;
      }
      if (msg.role === "evidence") {
        const trail = (msg.loop && msg.loop.trail)
          ? `<div class="ev-trail">${msg.loop.trail.map(it => `<div class="ev-trail-row"><span class="ev-trail-k">${escapeHtml(it.label)}</span><span class="ev-trail-v">${escapeHtml(it.note)}</span></div>`).join("")}<div class="ev-trail-stop">⟳ stopped: ${escapeHtml(msg.loop.stop)}</div></div>`
          : "";
        return `<div class="ev-card">
          <div class="ev-head"><span class="ev-ic">✓</span><span class="ev-title">Evidence · ${escapeHtml(msg.title)}</span><span class="spacer"></span><span class="ev-meets">meets the bar</span></div>
          <div class="ev-done"><span class="ev-k">Done when</span> ${escapeHtml(msg.done)}</div>
          <div class="ev-proof">${escapeHtml(msg.evidence)}</div>
          ${trail}
        </div>`;
      }
      if (msg.role === "checkpoint") {
        if (msg.refine) {
          return `<div class="cp-marker refine"><span class="cp-marker-ic">↻</span><span class="cp-marker-body"><span class="cp-marker-title">${escapeHtml(msg.title)}</span><span class="cp-marker-tag">Refining with your feedback</span></span></div>`;
        }
        if (msg.revise) {
          return `<div class="cp-marker revise"><span class="cp-marker-ic">✎</span><span class="cp-marker-body"><span class="cp-marker-title">${escapeHtml(msg.title)}</span><span class="cp-marker-tag">Plan revised — re-approval needed</span></span></div>`;
        }
        const tag = msg.auto ? "Auto-approved" : "Approved by you";
        return `<div class="cp-marker ${msg.auto?'auto':'manual'}"><span class="cp-marker-ic">${msg.auto?'»':'✓'}</span><span class="cp-marker-body"><span class="cp-marker-title">${escapeHtml(msg.title)}</span><span class="cp-marker-tag">${tag}${msg.gate?' · required':''}</span></span></div>`;
      }
      return `<div class="message ${msg.role==='user'?'user':''}"><div class="message-body">${escapeHtml(msg.text)}</div></div>`;
    }

    function renderDelegatedCard(s){
      return `
        <div class="delegated-card ${state.selectedSession===s.id?'active':''} ${state.scrollToSession===s.id?'flash':''}" data-session-card="${s.id}">
          ${statusPlate(plateStateForSession(s), 'session', s.worktree)}
          <span style="min-width:0"><span class="card-title">${escapeHtml(s.title)}</span><span class="card-sub">${escapeHtml(s.workflow||'Agent')} · ${escapeHtml(s.policy)}${subagentsFor(s.id).length ? ` · +${subagentsFor(s.id).length} sub-agents` : ''}</span></span>
          <span class="dc-right">
            ${pill(s.status, statusClass[s.status]||"")}
            <button class="dc-open" data-action="open-session-plan" data-id="${s.id}" title="Open in Plan">›</button>
          </span>
        </div>`;
    }

    function renderCheckpoint(m){
      const c = state.checkpointChoice;
      const hasPlanYet = !!(m.workstreams && m.workstreams.length);
      const prim = c==="stop" ? {l:"Stop mission", x:" danger"}
        : c==="revise" ? {l:"Revise plan", x:""}
        : c==="request" ? {l:"Request changes", x:""}
        : m.checkpoint==="pickwinner" ? {l: c==="b"?"Merge Alt B":"Merge Alt A", x:""}
        : (c==="merge" || m.checkpoint==="merge") ? {l:"Merge & finish", x:""}
        : m.checkpoint==="approval" ? {l: hasPlanYet ? "Approve plan" : "Draft the plan", x:""}
        : {l:"Continue", x:""};
      const actions = `<div class="checkpoint-actions"><button class="primary-button${prim.x}" data-action="checkpoint-confirm">${prim.l}</button></div>`;
      if (m.checkpoint === "pickwinner") {
        const winEv = missionNodeList(m).filter(x => x.node.altWorktree && x.node.status==="Completed");
        const rows = winEv.map(x => `<div class="bakeoff-row"><span class="bakeoff-name">${escapeHtml(x.node.title)}</span><span class="bakeoff-ev">${escapeHtml(nodeDoneEvidence(x.node).evidence)}</span></div>`).join("");
        return `
          <div class="checkpoint gate">
            <div class="checkpoint-title">Pick the winner <span class="spacer"></span>2nd worktree earned its cost</div>
            <div class="checkpoint-question"><strong>Two alternatives cleared the same bar — merge which?</strong><br>Both were built in isolated worktrees against identical acceptance criteria. Merge one; the other worktree is discarded.</div>
            ${rows ? `<div class="bakeoff-compare">${rows}</div>` : ""}
            <div class="option-grid">${["A — cache-based|Merge Alternative A (built in wt/…-alt-a).","B — index-based|Merge Alternative B (built in wt/…-alt-b)."].map(renderOption).join("")}</div>
            ${actions}
          </div>`;
      }
      if (m.checkpoint === "merge") {
        return `
          <div class="checkpoint gate">
            <div class="checkpoint-title">Merge checkpoint <span class="spacer"></span>Always stops</div>
            <div class="checkpoint-question"><strong>PR #142 is open — merge to finish?</strong><br>The change is up as a pull request. Merging squashes it into the base branch — the one irreversible step. Proceed, send it back for another pass, or stop.</div>
            <div class="option-grid">${["Merge|Squash-merge PR #142 and finish the mission.","Request changes|Send it back for another pass before merging.","Stop|End this Mission here."].map(renderOption).join("")}</div>
            ${actions}
          </div>`;
      }
      if (m.checkpoint === "approval") {
        const noPlan = !hasPlanYet;
        const head = noPlan ? "Approve to draft the plan" : "Approve the updated plan";
        const sub = noPlan
          ? "No plan exists yet — approving drafts the Mission Plan from the issue + skill, then runs it."
          : "The plan was changed — approve to resume with your updates.";
        const opts = noPlan
          ? ["Proceed|Draft the Mission Plan, then start.","Revise|Adjust the directive — or name areas to probe — before I draft.","Stop|End this Mission here."]
          : ["Proceed|Approve the updated plan and resume.","Revise|Keep editing the plan.","Stop|End this Mission here."];
        return `
          <div class="checkpoint">
            <div class="checkpoint-title">Mission checkpoint <span class="spacer"></span>Plan approval</div>
            <div class="checkpoint-question"><strong>${head}</strong><br>${sub}</div>
            <div class="option-grid">${opts.map(renderOption).join("")}</div>
            ${actions}
          </div>`;
      }
      const sNodes = missionNodeList(m);
      const total = sNodes.length;
      const next = sNodes.find(x => x.node.status === "Pending");
      const doneList = sNodes.filter(x => x.node.status === "Completed");
      const lastDone = doneList[doneList.length-1];
      const gatedNext = !!next && !!next.node.gate;
      const atGate = gatedNext && (m.pace === "Auto" || state.gateArmed);   // amber gate beat: in Auto it shows directly; in Step only after you continue past the step (the only gate now is the optional before-first-edit one)
      let head, sub;
      if (!next) {
        head = `All steps complete`;
        sub = `Nothing left to run.`;
      } else if (atGate) {
        head = `Before the first mutable write`;
        sub = `Your "before first mutable write" checkpoint — ${escapeHtml(next.node.title)} is about to make the first edits in the worktree. Approve to begin implementation, or revise the plan first.`;
      } else if (!lastDone) {
        head = `Plan ready · ${total} step${total>1?'s':''}`;
        sub = `Continue to start step 1: ${escapeHtml(next.node.title)}.`;
      } else {
        head = `Step ${sNodes.indexOf(lastDone)+1} of ${total} done · ${escapeHtml(lastDone.node.title)}`;
        sub = gatedNext
          ? `Continue to move on — ${escapeHtml(next.node.title)} makes the first edits and will pause for your approval first — or send feedback to refine this step.`
          : `Continue to start the next step — ${escapeHtml(next.node.title)} — or send feedback to refine this step.`;
      }
      const cpTitle = atGate ? "Required checkpoint" : "Step checkpoint";
      const cpTag = atGate ? "Always stops" : `${escapeHtml(m.pace)} pace`;
      const contDesc = atGate ? "Approve and start the edits." : "Approve and continue.";
      return `
        <div class="checkpoint ${atGate?'gate':''}">
          <div class="checkpoint-title">${cpTitle} <span class="spacer"></span>${cpTag}</div>
          <div class="checkpoint-question"><strong>${head}</strong><br>${sub}</div>
          <div class="option-grid">${[`Continue|${contDesc}`, "Revise|Change the plan first.", "Stop|End this Mission here."].map(renderOption).join("")}</div>
          ${actions}
        </div>`;
    }

    // Single source of truth for the fake MCP get_issue result, so a new mission that references #298
    // pulls the same canonical issue as the seeded example. Any other ref echoes the directive.
    function issueContextFor(ref, directive){
      if (ref === "#298") {
        return "#298 — open · labels: agent, cleanup, provider\n"
          + "title: Provider-side cleanup for Agent Mode & Oracle sessions\n"
          + "tearing down a session should release the provider handle;\n"
          + "today the local session is gone but the provider can leak.\n"
          + "acceptance: cleanup runs on teardown · unsupported providers\n"
          + "fail closed · nothing lands without review";
      }
      return `${ref} — open · labels: agent, enhancement\n`
        + `scope: ${directive || "(from your directive)"}\n`
        + `acceptance: change stays in one worktree · tests cover the\n`
        + `new path · nothing lands without review`;
    }

    function draftPlanForMission(m){
      const id = m.id;
      const tpl = resolveTemplateBlueprint(templateByName(m.template));   // built-in blueprint, or derived from a user template's brief
      const dir = m.objective || "";

      }
      if (choice === "request") {
        // Final-gate "Request changes": send it back for another pass (re-run build/verify steps), then return to the land gate. Not a re-plan.
        const list = missionNodeList(m);
        let landIdx = list.findIndex(x => x.node.coordinatorDirect);
        if (landIdx === -1) landIdx = list.findIndex(x => x.node.gate && !x.node.mutableBoundary);
        if (landIdx === -1) landIdx = list.length;
        let startIdx = list.findIndex(x => x.node.mutableBoundary);
        if (startIdx === -1) startIdx = Math.max(0, landIdx - 1);
        let reopened = 0;
        for (let i = startIdx; i < landIdx; i++) {
          const n = list[i].node;
          if (n.status === "Completed") { n.status = "Pending"; n.session = null; reopened++; }   // fresh sessions/cards on the next pass
        }
        m.messages.push({ role:"coordinator", text:`Changes requested — holding the merge and sending it back for another pass. Re-running implementation, tests, and review before we return to land${reopened?'':' (nothing to redo)'}. Add specifics in the composer if you have them.` });

        state.checkpointChoice = null; return;
      }
      if (wasApproval) {
        m.approval = "Approved"; m.status = "Running";
        m.messages.push({ role:"checkpoint", auto:false, gate:true, title:"Plan approval" });
        if (!m.workstreams || m.workstreams.length === 0) {
          draftPlanForMission(m);
          m.messages.push({ role:"coordinator", text:`Drafted the ${templateByName(m.template).name} plan — ${missionNodeList(m).map(x=>x.node.title).slice(0,3).join(", ")}, … On Step I pause after each step; on Auto I run and stop only where you require it.` });
        }
        m.checkpoint = "step"; // paused at "plan ready" (nothing running); on Auto the runner begins step 1
        state.checkpointChoice = null; return;
      }
      // Step Continue: paused at a boundary (last step Done, next Pending, nothing running).
      const nx = missionNodeList(m).find(x => x.node.status === "Pending");
      if (nx && nx.node.gate && m.pace === "Step" && !state.gateArmed) {
        state.gateArmed = true;        // first Continue past the step surfaces the gate's required checkpoint; the next Continue starts it

    /* ---- Mission runner: each step works on a delay, THEN completes. Step pauses after every step; Auto pauses only at a required gate. A checkpoint only shows at a clean boundary (step done, nothing running). ---- */
    let runTimer = null;
    function clearRun(){ if (runTimer) { clearTimeout(runTimer); runTimer = null; } }
    function runnerTick(m){
      // A loop node plays its iterations one at a time before it completes, so the loop is visible in the thread.
      const looping = missionNodeList(m).find(x => x.node.status === "Running" && x.node.loop && (x.node.loopIter||0) < x.node.loop.trail.length);
      if (looping) {
        const lp = looping.node.loop; const i = looping.node.loopIter || 0; const it = lp.trail[i];
        looping.node.loopIter = i + 1;
        const last = looping.node.loopIter >= lp.trail.length;
        m.messages.push({ role:"loopiter", node: looping.node.title, i, label: it.label, note: it.note, last, stop: last ? lp.stop : "", kind: lp.kind });
        m.checkpoint = "step"; return;   // keep the node Running; the next tick runs the next iteration (or completes it)
      }
      // A parallel band (2+ nodes running at once): each thread is its OWN supervised worktree. The Director re-steers each independently until it meets its bar, and threads CONVERGE one at a time as each is done — NOT a synchronized finish. (Some threads need an extra pass.)
      const band = missionNodeList(m).filter(x => x.node.status === "Running");
      if (band.length > 1) {
        // First entry into the band: announce the threads and give each its own re-steer budget (a later thread may need one more pass).
        if (band.every(x => x.node._steerTarget == null)) {
          band.forEach((x, idx) => { x.node._steerBeats = 0; x.node._steerTarget = 2 + Math.min(idx, 1); });
          m.messages.push({ role:"parallel", items: band.map(x => ({ title: x.node.title, note: threadLabel(x.node) + " · steering to its bar…" })) });
          m.checkpoint = "step"; return;
        }
        // Re-steer the least-progressed thread that hasn't met its bar yet (interleaved — one thread per tick, so you SEE them maintained side by side).
        const steering = band.filter(x => (x.node._steerBeats || 0) < x.node._steerTarget)
                             .sort((a, b) => (a.node._steerBeats || 0) - (b.node._steerBeats || 0))[0];
        if (steering) {
          const n = steering.node; n._steerBeats = (n._steerBeats || 0) + 1;
          const last = n._steerBeats >= n._steerTarget; const note = parProgressNote(n, n._steerBeats);
          m.messages.push({ role:"psteer", node: n.title, worktree: threadLabel(n), beat: n._steerBeats, last, note });
          const s = n.session ? session(n.session) : null; if (s && s.transcript) s.transcript.push("Re-steer " + n._steerBeats + " — " + note);
          m.checkpoint = "step"; return;
        }
        // Every remaining thread has met its bar → converge them ONE per tick (independent completion times), so the integrate/compare node waits for all.
        const doneThread = band.find(x => x.node.status === "Running");
        if (doneThread) {
          completeNode(m, doneThread); delete doneThread.node._steerTarget; delete doneThread.node._steerBeats;
          if (missionNodeList(m).some(x => x.node.status === "Running")) { m.checkpoint = "step"; return; }   // other threads still converging
          if (!readyPending(m).length) {
            if (m._landWrap) { m.checkpoint = "landwrap"; return; }
            if (missionNodeList(m).some(x => x.node.status === "Pending")) { m.checkpoint = "step"; return; }
            finishMission(m); return;
          }
          m.checkpoint = "step"; return;
        }
      }
      completeRunningNode(m);   // completes one running node per tick
      if (missionNodeList(m).some(x => x.node.status === "Running")) { m.checkpoint = "step"; return; }   // parallel siblings still finishing
      if (!readyPending(m).length) {
        if (m._landWrap) { m.checkpoint = "landwrap"; return; }   // dwell on the terminal output, then syncRunner posts the wrap-up
        if (missionNodeList(m).some(x => x.node.status === "Pending")) { m.checkpoint = "step"; return; }  // waiting on deps (valid graph resolves next tick)
        finishMission(m); return;
      }
      m.checkpoint = "step"; // paused at the boundary; syncRunner decides whether Auto crosses it
    }
    function syncRunner(){
      clearRun();

        } else {

          }

      }
      if (m.landPhase === "merging") {

        runTimer = setTimeout(() => {

          if (mm) {
            const b = [...mm.messages].reverse().find(x => x.role === "bash" && x.running);
            if (b) { b.running = false; b.output = "Merging PR #142 (squash)…\nSquash-merged 6 commits into main\n 6 files changed, 142 insertions(+), 37 deletions(-)\nDeleted branch rp/agent/" + mm.id + ".\n✓ Landed."; }
            const land = missionNodeList(mm).find(x => x.node.coordinatorDirect);

          }

          if (mm) {
            const b = [...mm.messages].reverse().find(x => x.role === "bash" && x.running);
            if (b) { b.running = false; b.output = "Writing report…\n report.md (142 lines)\n✓ Wrote report.md — no PR, no issue."; }
            const land = missionNodeList(mm).find(x => x.node.coordinatorDirect);
            if (land) { land.node.status = "Completed"; pushEvidence(mm, land.node.title, "Wrote report.md — findings + recommendation."); }
            mm.landPhase = "done"; mm._landWrap = true; mm._wrapMsg = "Wrote report.md — findings and a recommendation. No code changed, no PR, no issue. The mission is complete."; mm.checkpoint = "landwrap";
          }
          render();
        }, 3500);
        return;
      }
      if (m.checkpoint === "landwrap") {

        runTimer = setTimeout(() => {
          runTimer = null; const mm = mission(state.selectedMission);
          if (mm) { mm._landWrap = false; mm.messages.push({ role:"coordinator", text: mm._wrapMsg || "Landed — squash-merged PR #142 into the base branch and deleted the worktree branch. The mission is complete." }); finishMission(mm); }

        }, 2600);
        return;
      }

      const hasPlan = !!(m.workstreams && m.workstreams.length);
      const running = hasPlan && missionNodeList(m).some(x => x.node.status === "Running");
      const ready = hasPlan ? readyPending(m) : [];
      if (running) {
        const runningNodes = missionNodeList(m).filter(x => x.node.status === "Running");
        const rn = runningNodes[0];
        const midLoop = rn && rn.node.loop && (rn.node.loopIter||0) < rn.node.loop.trail.length;   // faster ticks while a loop iterates
        const parBand = runningNodes.length > 1;                                                    // faster ticks while a parallel band shows progress
        runTimer = setTimeout(() => { runTimer = null; const mm = mission(state.selectedMission); if (mm) runnerTick(mm); render(); }, (midLoop || parBand) ? 1700 : 3500);
      } else if (m.pace==="Auto" && ready.length && !ready.some(e => e.node.gate)) {
        runTimer = setTimeout(() => { runTimer = null; const mm = mission(state.selectedMission); if (mm) startNextNode(mm, true); render(); }, 2200);
      }
    }
